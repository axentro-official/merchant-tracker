<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Axentro Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- Splash/Loader -->
  <div id="splash" class="splash-screen">
    <div class="loader"></div>
    <p>جاري تحميل البيانات...</p>
  </div>

  <div id="app" class="hidden">
    <!-- Login -->
    <div id="login-view" class="login-container">
      <div class="login-box">
        <h1>Axentro</h1>
        <p>نظام متابعة التجار</p>
        <form id="login-form">
          <input type="password" id="password" placeholder="كلمة المرور" required>
          <button type="submit">دخول</button>
        </form>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="main-view" class="hidden wrapper">
      
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo">Axentro</div>
        <nav>
          <button class="nav-btn active" data-page="home">🏠 الرئيسية</button>
          <button class="nav-btn" data-page="merchants">👥 التجار</button>
          <button class="nav-btn" data-page="machines">🔌 المكن</button>
          <button class="nav-btn" data-page="transfers">💸 تحويلات</button>
          <button class="nav-btn" data-page="collections">💰 تحصيلات</button>
          <button class="nav-btn" data-page="statement">📜 كشف حساب</button>
          <button class="nav-btn" data-page="archives">📦 أرشيف</button>
        </nav>
        <div class="side-actions">
          <button id="export-btn" class="action-btn">📊 تصدير Excel</button>
          <button id="logout-btn" class="action-btn danger">🚪 خروج</button>
        </div>
      </aside>

      <!-- Content -->
      <main class="content-area">
        
        <!-- Header -->
        <header class="top-header">
          <h2 id="page-title">لوحة التحكم</h2>
          <div class="header-tools">
            <button id="refresh-btn" class="icon-btn">🔄 تحديث</button>
          </div>
        </header>

        <!-- Pages Container -->
        <div class="pages-wrapper">
          
          <!-- HOME -->
          <section id="home-page" class="page active">
            <div class="stats-grid">
              <div class="stat-card blue"><h3>تحويلات الشهر</h3><p id="stat-transfers">0</p></div>
              <div class="stat-card green"><h3>تحصيلات الشهر</h3><p id="stat-collections">0</p></div>
              <div class="stat-card red"><h3>المتبقي</h3><p id="stat-remaining">0</p></div>
              <div class="stat-card dark"><h3>عدد التجار</h3><p id="stat-merchants">0</p></div>
            </div>
            <div class="data-card">
              <div class="card-header">أعلى 5 مديونيات</div>
              <div id="top-debtors" class="list-group"></div>
            </div>
          </section>

          <!-- MERCHANTS -->
          <section id="merchants-page" class="page">
            <div class="data-card">
              <div class="card-header">إضافة تاجر جديد</div>
              <form id="add-merchant-form" class="form-row">
                <input type="text" id="m-name" placeholder="اسم التاجر" required>
                <input type="text" id="m-acc" placeholder="رقم الحساب" required>
                <input type="text" id="m-phone" placeholder="الهاتف">
                <button type="submit">حفظ</button>
              </form>
            </div>
            <div class="data-card">
              <div class="card-header">قائمة التجار</div>
              <input type="text" id="search-merchants" placeholder="بحث..." class="search-input">
              <div id="merchants-list" class="list-group"></div>
            </div>
          </section>

          <!-- MACHINES -->
          <section id="machines-page" class="page">
             <div class="data-card">
              <div class="card-header">إضافة مكنة</div>
              <form id="add-machine-form" class="form-row">
                <select id="mach-merchant" required></select>
                <input type="text" id="mach-barcode" placeholder="الباركود" required>
                <input type="number" id="mach-target" placeholder="التارجت">
                <button type="submit">حفظ</button>
              </form>
            </div>
            <div class="data-card">
              <div id="machines-list" class="list-group"></div>
            </div>
          </section>

          <!-- TRANSFERS -->
          <section id="transfers-page" class="page">
            <div class="data-card">
              <div class="card-header">تسجيل تحويل</div>
              <form id="add-transfer-form" class="form-row">
                <select id="tr-merchant" required></select>
                <select id="tr-machine" required></select>
                <input type="number" id="tr-amount" placeholder="القيمة" required>
                <button type="submit">تسجيل</button>
              </form>
            </div>
            <div class="data-card">
              <div id="transfers-list" class="list-group"></div>
            </div>
          </section>

          <!-- COLLECTIONS -->
          <section id="collections-page" class="page">
            <div class="data-card">
              <div class="card-header">تسجيل تحصيل</div>
              <form id="add-coll-form" class="form-row">
                <select id="co-merchant" required></select>
                <select id="co-machine" required></select>
                <input type="number" id="co-amount" placeholder="القيمة" required>
                <select id="co-type"><option value="جزئي">جزئي</option><option value="كلي">كلي</option></select>
                <button type="submit">تسجيل</button>
              </form>
            </div>
            <div class="data-card">
              <div id="collections-list" class="list-group"></div>
            </div>
          </section>

          <!-- STATEMENT -->
          <section id="statement-page" class="page">
            <div class="data-card">
              <div class="card-header">كشف حساب</div>
              <form id="stmt-form" class="form-row">
                <select id="stmt-merchant" required></select>
                <button type="submit">عرض</button>
              </form>
              <div id="stmt-result" class="hidden">
                <div class="stmt-summary">
                  <div>إجمالي تحويلات: <b id="stmt-t">0</b></div>
                  <div>إجمالي تحصيلات: <b id="stmt-c">0</b></div>
                  <div class="highlight">المتبقي: <b id="stmt-r">0</b></div>
                </div>
                <div id="stmt-moves" class="list-group"></div>
              </div>
            </div>
          </section>

          <!-- ARCHIVES -->
          <section id="archives-page" class="page">
            <div class="data-card">
              <div class="card-header">سجل الشهور</div>
              <div id="archives-list" class="list-group"></div>
            </div>
          </section>

        </div>
      </main>
    </div>

    <!-- Mobile Navigation -->
    <nav class="bottom-nav">
      <button class="b-nav-btn active" data-page="home"><span>🏠</span><label>رئيسية</label></button>
      <button class="b-nav-btn" data-page="transfers"><span>💸</span><label>تحويل</label></button>
      <button class="b-nav-btn" data-page="collections"><span>💰</span><label>تحصيل</label></button>
      <button class="b-nav-btn" data-page="merchants"><span>👥</span><label>تجار</label></button>
      <button class="b-nav-btn" onclick="showMore()"><span>⚙️</span><label>المزيد</label></button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
