<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Axentro System v3.0 Professional</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    
    <!-- External Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>
    
    <!-- Styles (انسخ كل الـ CSS من الرد السابق - الجزء الأول) -->
    <style>
        /* انسخ كل الـ styles من ردي السابق */
        :root { --primary: #2563eb; /* ... */ }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f8fafc 100%); min-height: 100vh; }
        /* ... باقي الـ styles */
        
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; backdrop-filter: blur(12px); transition: opacity 0.4s ease, visibility 0.4s ease; }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader { width: 60px; height: 60px; position: relative; }
        .loader::before, .loader::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; border-top-color: var(--primary); animation: spin 1s linear infinite; }
        .loader::after { inset: 6px; border-top-color: var(--secondary); animation-duration: 0.8s; animation-direction: reverse; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* ... انسخ كل الـ styles الأخرى من ردي الأول */
        /* (أو احتفظ بالملف القديم واحذف فقط الـ <script> الأخير واستبدله) */
    </style>
</head>
<body>

<!-- === HTML STRUCTURE (نفس الهيكل تماماً) === -->

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loader"></div>
    <div class="loading-text"><i class="fas fa-circle-notch fa-spin"></i><span id="loadingText">جاري التحميل...</span></div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal">...نفس المحتوى...</div>

<!-- Scanner Modal -->
<div id="scannerModal" class="modal">...نفس المحتوى...</div>

<!-- Main Modal -->
<div id="mainModal" class="modal">...نفس المحتوى...</div>

<!-- Login Section -->
<div id="loginSection">...نفس المحتوى...</div>

<!-- App Container -->
<div id="appContainer">
    <nav class="navbar">...</nav>
    <div class="tabs-nav">...</div>
    <div class="main-content">
        <!-- كل الـ pages بنفس الهيكل -->
        <div id="page-home" class="page active">...</div>
        <div id="page-merchants" class="page">...</div>
        <!-- ... باقي الصفحات -->
    </div>
    <footer class="footer">...</footer>
</div>

<!-- Audio Elements -->
<audio id="doneSound" preload="auto"><source src="done.mp3" type="audio/mpeg"></audio>
<audio id="loginErrorSound" preload="auto"><source src="login-error.mp3" type="audio/mpeg"></audio>
<!-- ... باقي الأصوات -->

<!-- ⭐⭐⭐ THIS IS THE IMPORTANT PART ⭐⭐⭐ -->
<script type="module" src="./src/core/app.js"></script>

</body>
</html>
