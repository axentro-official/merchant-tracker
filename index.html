// ===== INITIALIZATION - WITH LIBRARY CHECK =====
function initSupabase() {
    return new Promise(function(resolve, reject) {
        try {
            console.log('🔧 Initializing Supabase...');
            // Wait for supabase to be loaded (either primary or fallback)
            var checkInterval = setInterval(function() {
                if (typeof window.supabase !== 'undefined') {
                    clearInterval(checkInterval);
                    supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
                    if (supabase) {
                        console.log('✅ Supabase initialized successfully');
                        resolve(true);
                    } else {
                        reject(new Error('Failed to create Supabase client'));
                    }
                } else if (window.SUPABASE_LOADED === false && performance.now() > 8000) {
                    clearInterval(checkInterval);
                    reject(new Error('Supabase library not loaded after 8 seconds. Check internet connection.'));
                }
            }, 200);
        } catch(e) {
            reject(e);
        }
    });
}

// ===== AUTHENTICATION - USING DATABASE PASSWORD =====
async function performLogin() {
    var passwordInput = document.getElementById('passwordInput');
    var loginBtn = document.getElementById('loginBtn');
    var password = passwordInput ? passwordInput.value.trim() : '';
    
    if(!password) { 
        showToast('⚠️ يرجى إدخال كلمة المرور', 'warning'); 
        if(passwordInput) shakeElement(passwordInput);
        return; 
    }
    
    if(loginBtn) loginBtn.disabled = true;
    if(loginBtn) loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
    updateLoadingText('جاري التحقق من كلمة المرور...');
    
    try {
        // First, ensure supabase is ready
        if (!supabase) {
            await initSupabase();
        }
        
        var success = false;
        var message = '';
        
        // Method 1: Read password from config table
        console.log('🔐 Fetching admin password from config table...');
        var { data: configData, error: configError } = await supabase
            .from('config')
            .select('value')
            .eq('key', 'admin_password')
            .maybeSingle();  // Use maybeSingle to avoid error if not found
        
        if (!configError && configData && configData.value === password) {
            success = true;
            message = 'تم تسجيل الدخول بنجاح';
        } else if (configError && configError.code === 'PGRST116') {
            // Table 'config' might not exist, or row not found
            console.warn('Config table not found or empty. Using fallback password (admin123).');
            // Fallback password for initial setup
            if (password === 'admin123') {
                success = true;
                message = 'تم تسجيل الدخول بنجاح (وضع الإعدادات الأولية)';
                // Suggest to create config row
                setTimeout(() => {
                    showToast('⚠️ يُنصح بإنشاء جدول config وإضافة admin_password', 'warning', 8000);
                }, 1000);
            } else {
                message = 'كلمة المرور غير صحيحة (استخدم admin123 للإعدادات الأولية)';
            }
        } else if (configError) {
            console.error('Config query error:', configError);
            message = 'خطأ في قاعدة البيانات: ' + configError.message;
        } else {
            message = 'كلمة المرور غير صحيحة';
        }
        
        if(success) {
            // Store session
            localStorage.setItem('axentro_auth', JSON.stringify({ 
                loggedIn: true, 
                timestamp: Date.now(), 
                sessionExpiry: Date.now() + CONFIG.SESSION_DURATION,
                method: 'db_password'
            }));
            
            showToast('🎉 مرحباً بك!', 'success');
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            await refreshAllData();
        } else {
            showToast('❌ ' + message, 'error');
            if(passwordInput) { passwordInput.value = ''; passwordInput.focus(); shakeElement(passwordInput); }
        }
    } catch(err) {
        console.error('❌ Login error:', err);
        showToast('❌ حدث خطأ: ' + err.message, 'error');
    } finally {
        showLoading(false);
        if(loginBtn) { loginBtn.disabled = false; loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول'; }
    }
}

function handleLoginKeypress(e) { if(e.key === 'Enter') { e.preventDefault(); performLogin(); } }

    input.type = input.type === 'password' ? 'text' : 'password';

}

function checkSession() {
    try {
        var auth = localStorage.getItem('axentro_auth');
        if(!auth) return false;
        var data = JSON.parse(auth);
        return data.loggedIn && Date.now() < data.sessionExpiry;
    } catch(e) { return false; }
}

// ===== DATA OPERATIONS =====
async function refreshAllData() {
    showLoading(true);
    updateLoadingText('جاري تحميل البيانات...');
    setConnectionStatus('connecting');
    
    try {
        if (!supabase) await initSupabase();
        
        var results = await Promise.all([
            supabase.from('merchants').select('*').order('created_at', { ascending: true }),
            supabase.from('machines').select('*').order('created_at', { ascending: true }),
            supabase.from('transfers').select('*').order('created_at', { ascending: true }),
            supabase.from('collections').select('*').order('created_at', { ascending: true }),
            supabase.from('requests').select('*').order('created_at', { ascending: true }),
            supabase.from('archives').select('*').order('created_at', { ascending: false })
        ]);
        
        DB.merchants = results[0].data || [];
        DB.machines = results[1].data || [];
        DB.transfers = results[2].data || [];
        DB.collections = results[3].data || [];
        DB.requests = results[4].data || [];
        DB.archives = results[5].data || [];
        
        console.log('✅ Data loaded');
        renderAllPages();
        updatePendingBadge();
        setConnectionStatus('live');
        showToast('✅ تم تحديث البيانات', 'success');
    } catch(e) {
        console.error('Refresh error:', e);
        setConnectionStatus('offline');
        showToast('❌ فشل تحميل البيانات: ' + e.message, 'error');
    } finally {
        showLoading(false);
    }
}

// ===== DASHBOARD =====
function renderDashboard() {
    var now = new Date();
    var currentMonth = now.toLocaleString('ar-EG', { month: 'long', year: 'numeric' });
    var today = now.toISOString().split('T')[0];
    
    var monthTransfers = DB.transfers.filter(t => t['الشهر'] === currentMonth);
    var totalTransfersVal = monthTransfers.reduce((s, t) => s + (Number(t['قيمة التحويل']) || 0), 0);
    var totalCollectionsVal = DB.collections.filter(c => c['شهر'] === currentMonth).reduce((s, c) => s + (Number(c['قيمة التحصيل']) || 0), 0);
    var todayTransfers = DB.transfers.filter(t => t['التاريخ'] === today).reduce((s, t) => s + (Number(t['قيمة التحويل']) || 0), 0);

    var stats = [
        { label: 'عدد التجار', value: DB.merchants.length, icon: 'fa-users', type: '' },
        { label: 'عدد المكن', value: DB.machines.length, icon: 'fa-cash-register', type: 'purple' },
        { label: 'تحويلات الشهر', value: totalTransfersVal, icon: 'fa-exchange-alt', type: 'danger', isMoney: true },
        { label: 'تحصيلات الشهر', value: totalCollectionsVal, icon: 'fa-hand-holding-usd', type: 'success', isMoney: true },
        { label: 'صافي الشهر', value: totalTransfersVal - totalCollectionsVal, icon: 'fa-balance-scale', type: 'warning', isMoney: true },
        { label: 'تحويلات اليوم', value: todayTransfers, icon: 'fa-calendar-day', type: '', isMoney: true }
    ];
    
    var container = document.getElementById('dashboardStats');
    if(container) {
        container.innerHTML = stats.map(s => `
            <div class="stat-card ${s.type}">
                <div class="stat-card-header">
                    <span class="stat-card-title">${s.label}</span>
                    <div class="stat-card-icon"><i class="fas ${s.icon}"></i></div>
                </div>
                <div class="stat-card-value">${s.isMoney ? formatMoney(s.value) : formatNumber(s.value)}</div>
            </div>
        `).join('');
    }
    renderTopMachines();
}

function renderTopMachines() {
    var tbody = document.getElementById('topMachinesTable');
    if(!tbody) return;
    var now = new Date();
    var currentMonth = now.toLocaleString('ar-EG', { month: 'long', year: 'numeric' });
    var monthTransfers = DB.transfers.filter(t => t['الشهر'] === currentMonth);
    
    var performance = DB.machines.filter(m => Number(m['التارجت الشهري']) > 0)
        .map(m => {
            var achieved = monthTransfers.filter(t => String(t['رقم المكنة']).trim() === String(m['رقم المكنة']).trim())
                .reduce((s, t) => s + (Number(t['قيمة التحويل']) || 0), 0);
            var merchant = DB.merchants.find(mer => mer['رقم التاجر'] == m['رقم التاجر']);
            return { ...m, achieved, merchantName: merchant ? merchant['اسم التاجر'] : '-', activity: merchant ? merchant['اسم النشاط'] : '-', percentage: Math.min(Math.floor((achieved / Number(m['التارجت الشهري'])) * 100), 100) };
        })
        .sort((a,b) => b.percentage - a.percentage).slice(0,10);
    
    if(!performance.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد بيانات</p></td></tr>'; return; }
    
    tbody.innerHTML = performance.map((m,i) => {
        var pctClass = m.percentage >= 80 ? 'success' : m.percentage >= 50 ? 'warning' : 'danger';
        return `<tr>
            <td>${i+1}</td>
            <td><strong>${m['رقم المكنة']}</strong></td>
            <td>${m.merchantName}</td>
            <td>${m.activity}</td>
            <td>${formatMoney(m['التارجت الشهري'])}</td>
            <td>${formatMoney(m.achieved)}</td>
            <td><span class="badge badge-${pctClass}">${m.percentage}%</span></td>
        </tr>`;
    }).join('');
}

    var nameVal = isEdit && data ? escapeHtml(data['اسم التاجر']) || '' : '';
    var activityVal = isEdit && data ? escapeHtml(data['اسم النشاط']) || '' : '';
    var accountVal = isEdit && data ? escapeHtml(data['رقم الحساب']) || '' : '';
    var phoneVal = isEdit && data ? escapeHtml(data['رقم الهاتف']) || '' : '';
    var addressVal = isEdit && data ? escapeHtml(data['العنوان']) || '' : '';
    var areaVal = isEdit && data ? escapeHtml(data['المنطقة']) || '' : '';
    var statusVal = isEdit && data ? data['الحالة'] || 'نشط' : 'نشط';
    var notesVal = isEdit && data ? escapeHtml(data['ملاحظات']) || '' : '';

    var content = `<div class="modal-header"><h3><i class="fas ${isEdit ? 'fa-edit' : 'fa-user-plus'}"></i> ${isEdit ? 'تعديل تاجر' : 'إضافة تاجر جديد'}</h3></div>
    <div class="form-group"><label class="form-label">اسم التاجر <span class="required">*</span></label><input type="text" id="m_name" class="form-control" placeholder="الاسم الكامل" value="${nameVal}"></div>
    <div class="form-group"><label class="form-label">اسم النشاط التجاري</label><input type="text" id="m_activity" class="form-control" placeholder="نشاط المتجر" value="${activityVal}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem"><div class="form-group"><label class="form-label">رقم الحساب <span class="required">*</span></label><input type="text" id="m_account" class="form-control" dir="ltr" value="${accountVal}"></div><div class="form-group"><label class="form-label">رقم الهاتف</label><input type="text" id="m_phone" class="form-control" dir="ltr" value="${phoneVal}"></div></div>
    <div class="form-group"><label class="form-label">العنوان</label><input type="text" id="m_address" class="form-control" placeholder="العنوان بالتفصيل" value="${addressVal}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem"><div class="form-group"><label class="form-label">المنطقة</label><input type="text" id="m_area" class="form-control" value="${areaVal}"></div><div class="form-group"><label class="form-label">الحالة</label><select id="m_status" class="form-control"><option value="نشط" ${statusVal==='نشط'?'selected':''}>✅ نشط</option><option value="غير نشط" ${statusVal==='غير نشط'?'selected':''}>⛔ غير نشط</option><option value="موقوف" ${statusVal==='موقوف'?'selected':''}>🚫 موقوف</option></select></div></div>
    <div class="form-group"><label class="form-label">ملاحظات</label><textarea id="m_notes" class="form-control" rows="3">${notesVal}</textarea></div>
    <button class="btn btn-primary btn-block" onclick="saveMerchant('${editIdStr.replace(/'/g, "\\'")}')"><i class="fas fa-save"></i> ${isEdit ? 'تحديث البيانات' : 'إضافة تاجر'}</button>`;
    showModal(content);
}

async function saveMerchant(editId) {
    var nameInput = document.getElementById('m_name');
    var name = nameInput ? nameInput.value.trim() : '';
    if(!name) { showToast('⚠️ اسم التاجر مطلوب', 'warning'); return; }
    
    showLoading(true);
    updateLoadingText('جاري حفظ بيانات التاجر...');
    
    try {
        var merchantId = editId;
        if(!editId || editId === 'null' || editId === '') {
            var maxId = DB.merchants.reduce((max, m) => Math.max(max, parseInt(m['رقم التاجر']) || 0), 0);
            merchantId = String(maxId + 1).padStart(4, '0');
            var existing = DB.merchants.find(m => m['رقم التاجر'] === merchantId);
            while(existing) { maxId++; merchantId = String(maxId + 1).padStart(4, '0'); existing = DB.merchants.find(m => m['رقم التاجر'] === merchantId); }
        }
        
        var merchantData = {
            "اسم التاجر": name,
            "اسم النشاط": document.getElementById('m_activity') ? document.getElementById('m_activity').value.trim() : '',
            "رقم الحساب": document.getElementById('m_account') ? document.getElementById('m_account').value.trim() : '',
            "رقم الهاتف": document.getElementById('m_phone') ? document.getElementById('m_phone').value.trim() : '',
            "العنوان": document.getElementById('m_address') ? document.getElementById('m_address').value.trim() : '',
            "المنطقة": document.getElementById('m_area') ? document.getElementById('m_area').value.trim() : '',
            "الحالة": document.getElementById('m_status') ? document.getElementById('m_status').value : 'نشط',
            "ملاحظات": document.getElementById('m_notes') ? document.getElementById('m_notes').value.trim() : ''
        };
        
        if(!editId || editId === 'null' || editId === '') merchantData["رقم التاجر"] = merchantId;
        
        var result;
        if(editId && editId !== 'null' && editId !== '') {
            result = await supabase.from('merchants').update(merchantData).eq('رقم التاجر', editId);
            if(result.error) throw new Error(result.error.message);
            showToast('✅ تم تحديث التاجر', 'success');
        } else {
            result = await supabase.from('merchants').insert([merchantData]);
            if(result.error) throw new Error(result.error.message);
            showToast('✅ تم إضافة التاجر', 'success');
        }
        closeMainModal();
        await refreshAllData();
    } catch(e) {
        console.error('Save merchant error:', e);
        showToast('❌ ' + e.message, 'error');
    } finally { showLoading(false); }
}

async function editMerchant(id) {
    var merchant = DB.merchants.find(m => String(m['رقم التاجر']) === String(id));
    if(merchant) openMerchantModal(merchant);
    else showToast('❌ لم يتم العثور على التاجر', 'error');
}

async function deleteMerchant(id) {
    var merchant = DB.merchants.find(m => String(m['رقم التاجر']) === String(id));
    if(!merchant) return;
    showConfirm(`هل تريد حذف التاجر "${escapeHtml(merchant['اسم التاجر'])}"؟\n⚠️ سيتم حذف جميع البيانات المرتبطة!`, async function() {
        showLoading(true);
        try {
            var result = await supabase.from('merchants').delete().eq('رقم التاجر', id);
            if(result.error) throw new Error(result.error.message);
            showToast('✅ تم حذف التاجر', 'success');
            await refreshAllData();
        } catch(e) { showToast('❌ ' + e.message, 'error'); }
        finally { showLoading(false); }
    }, 'نعم، احذف');
}

function renderMerchants() {
    var tbody = document.getElementById('merchantsTable');
    if(!tbody) return;
    var list = DB.merchants.filter(m => {
        if(searchTerms.merchant) {
            var term = searchTerms.merchant.toLowerCase();
            return (m['رقم التاجر'] ? m['رقم التاجر'].includes(term) : false) || 
                   (m['اسم التاجر'] ? normalizeText(m['اسم التاجر']).includes(term) : false) || 
                   (m['رقم الحساب'] ? m['رقم الحساب'].includes(term) : false);
        }
        return true;
    });
    var statusFilter = document.getElementById('merchantStatusFilter') ? document.getElementById('merchantStatusFilter').value : '';
    if(statusFilter) list = list.filter(m => m['الحالة'] === statusFilter);
    
    if(!list.length) { tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><i class="fas fa-users"></i><p>لا يوجد تجار</p></td></tr>'; return; }
    
    tbody.innerHTML = list.map((m,i) => `
        <tr>
            <td>${i+1}</td>
            <td><code style="color:var(--secondary);font-weight:700">${m['رقم التاجر']}</code></td>
            <td><strong>${m['اسم التاجر'] || '-'}</strong></td>
            <td>${m['اسم النشاط'] || '-'}</td>
            <td dir="ltr">${m['رقم الحساب']||'-'}</td>
            <td dir="ltr">${m['رقم الهاتف']||'-'}</td>

async function saveMachine(editId) {
    var merchId = document.getElementById('mc_merchant_id') ? document.getElementById('mc_merchant_id').value : '';
    var serial = document.getElementById('mc_serial') ? document.getElementById('mc_serial').value.trim() : '';
    if(!merchId) { showToast('⚠️ يجب اختيار التاجر', 'warning'); return; }
    if(!serial) { showToast('⚠️ الرقم التسلسلي مطلوب', 'warning'); return; }
    
    showLoading(true);
    updateLoadingText('جاري حفظ بيانات المكنة...');
    try {
        var merchant = DB.merchants.find(m => String(m['رقم التاجر']) === String(merchId));
        var machineId = editId;
        if(!editId || editId === 'null' || editId === '') {
            var maxId = DB.machines.reduce((max, m) => Math.max(max, parseInt(m['رقم المكنة']) || 0), 0);
            machineId = String(maxId + 1).padStart(4, '0');
        }
        var machineData = {
            "رقم التاجر": merchId,
            "اسم التاجر": merchant ? merchant['اسم التاجر'] : '',
            "اسم النشاط": merchant ? merchant['اسم النشاط'] : '',
            "الرقم التسلسلي": serial,
            "رقم الحساب": merchant ? merchant['رقم الحساب'] : '',
            "التارجت الشهري": Number(document.getElementById('mc_target') ? document.getElementById('mc_target').value : 0) || 0,
            "الحالة": document.getElementById('mc_status') ? document.getElementById('mc_status').value : 'نشطة',
            "ملاحظات": document.getElementById('mc_notes') ? document.getElementById('mc_notes').value.trim() : ''
        };
        if(!editId || editId === 'null' || editId === '') machineData["رقم المكنة"] = machineId;
        
        var result;
        if(editId && editId !== 'null' && editId !== '') {
            result = await supabase.from('machines').update(machineData).eq('رقم المكنة', editId);
            if(result.error) throw new Error(result.error.message);
            showToast('✅ تم تحديث المكنة', 'success');
        } else {
            result = await supabase.from('machines').insert([machineData]);
            if(result.error) throw new Error(result.error.message);
            showToast('✅ تم إضافة المكنة', 'success');
        }
        closeMainModal();
        await refreshAllData();
    } catch(e) {
        console.error('Save machine error:', e);
        showToast('❌ ' + e.message, 'error');
    } finally { showLoading(false); }
}

async function openScanner(inputId) {
    currentScannerInput = inputId;
    var modal = document.getElementById('scannerModal');
    if(modal) { modal.style.display = 'flex'; setTimeout(() => modal.classList.add('show'), 10); }
    var scanDiv = document.getElementById('scanResult');
    if(scanDiv) scanDiv.style.display = 'none';
    try {
        var stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
        scannerStream = stream;
        var videoEl = document.getElementById('scannerVideo');
        if(videoEl) videoEl.srcObject = stream;
        flashState = false;
        updateFlashIcon();
    } catch(err) { showToast('❌ لا يمكن الوصول للكاميرا', 'error'); closeScanner(); }
}

function closeScanner() {
    var modal = document.getElementById('scannerModal');
    if(modal) { modal.classList.remove('show'); setTimeout(() => { modal.style.display = 'none'; stopScanner(); }, 300); }
    else stopScanner();
}

function stopScanner() { if(scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; } var video = document.getElementById('scannerVideo'); if(video) video.srcObject = null; }

async function toggleFlash() {
    if(!scannerStream) return;
    try {
        var track = scannerStream.getVideoTracks()[0];
        if('torch' in track.getSettings()) { await track.applyConstraints({ advanced: [{ torch: !flashState }] }); flashState = !flashState; updateFlashIcon(); }
        else showToast('⚠️ الفلاش غير مدعوم', 'warning');
    } catch(err) { showToast('❌ خطأ الفلاش', 'error'); }
}

function updateFlashIcon() { var icon = document.getElementById('flashIcon'); if(icon) icon.className = flashState ? 'fas fa-lightbulb' : 'fas fa-bolt'; }

function captureScan() {
    scannedValueTemp = 'SN-' + Date.now().toString(36).toUpperCase();
    var span = document.getElementById('scannedValue'); if(span) span.textContent = scannedValueTemp;
    var resDiv = document.getElementById('scanResult'); if(resDiv) resDiv.style.display = 'block';
    showToast('📸 تم المسح!', 'success');
}

function useScannedValue() {
    if(currentScannerInput && scannedValueTemp) {
        var input = document.getElementById(currentScannerInput);
        if(input) { input.value = scannedValueTemp; input.dispatchEvent(new Event('input')); }
        closeScanner();
        showToast('✅ تم استخدام الرقم', 'success');
    }
}

async function saveTransfer(editId) {
    var merchId = document.getElementById('tr_merchant_id') ? document.getElementById('tr_merchant_id').value : '';
    var amount = parseFloat(document.getElementById('tr_amount') ? document.getElementById('tr_amount').value : 0);
    if(!merchId) { showToast('⚠️ يجب اختيار التاجر', 'warning'); return; }
    if(!amount || amount <= 0) { showToast('⚠️ المبلغ غير صحيح', 'error'); return; }
    
    showLoading(true);
    updateLoadingText('جاري حفظ التحويل...');
    try {
        var merchant = DB.merchants.find(m => String(m['رقم التاجر']) === String(merchId));
        var now = new Date();
        var refCode = editId;
        if(!editId || editId === 'null' || editId === '') {
            refCode = 'TRF-' + now.toISOString().split('T')[0].replace(/-/g,'') + '-' + String(Math.floor(Math.random()*10000)).padStart(4,'0');
            while(DB.transfers.some(t => t['الرقم المرجعي'] === refCode)) {
                refCode = 'TRF-' + now.toISOString().split('T')[0].replace(/-/g,'') + '-' + String(Math.floor(Math.random()*10000)).padStart(4,'0');
            }
        }
        var transferData = {
            "الرقم المرجعي": refCode,
            "رقم التاجر": merchId,
            "اسم التاجر": merchant ? merchant['اسم التاجر'] : '',
            "رقم الحساب": merchant ? merchant['رقم الحساب'] : '',
            "نوع التحويل": document.getElementById('tr_type') ? document.getElementById('tr_type').value : 'رصيد خدمات',
            "قيمة التحويل": Math.round(amount * 100) / 100,
            "التاريخ": now.toISOString().split('T')[0],
            "الوقت": formatTimeForDB(now),
            "ملاحظات": document.getElementById('tr_notes') ? document.getElementById('tr_notes').value.trim() : '',
            "الشهر": now.toLocaleString('ar-EG', { month: 'long', year: 'numeric' })
        };
        
        var result;
        if(editId && editId !== 'null' && editId !== '') {
            result = await supabase.from('transfers').update(transferData).eq('الرقم المرجعي', editId);
            if(result.error) throw new Error(result.error.message);
            showToast('✅ تم تحديث التحويل', 'success');
        } else {
            result = await supabase.from('transfers').insert([transferData]);
            if(result.error) throw new Error(result.error.message);
            showToast('✅ تم إضافة التحويل', 'success');
            await logAction('تحويل جديد', refCode, 'تحويل: ' + amount + ' جنيه - ' + (merchant ? merchant['اسم التاجر'] : ''));
        }
        closeMainModal();
        await refreshAllData();
    } catch(e) {
        console.error('Transfer error:', e);
        showToast('❌ فشل الحفظ: ' + e.message, 'error');
    } finally { showLoading(false); }
}

async function saveCollection(editId) {
    var merchId = document.getElementById('col_merchant_id') ? document.getElementById('col_merchant_id').value : '';
    var amount = parseFloat(document.getElementById('col_amount') ? document.getElementById('col_amount').value : 0);
    if(!merchId) { showToast('⚠️ يجب اختيار التاجر', 'warning'); return; }
    if(!amount || amount <= 0) { showToast('⚠️ المبلغ غير صحيح', 'error'); return; }
    
    showLoading(true);
    updateLoadingText('جاري حفظ التحصيل...');
    try {
        var merchant = DB.merchants.find(m => String(m['رقم التاجر']) === String(merchId));
        var now = new Date();
        var merchantTransfers = DB.transfers.filter(t => String(t['رقم التاجر']) === String(merchId));
        var merchantCollections = DB.collections.filter(c => String(c['رقم التاجر']) === String(merchId) && c['الرقم المرجعي'] !== editId);
        var totalTransfers = merchantTransfers.reduce((s,t) => s + (Number(t['قيمة التحويل']) || 0), 0);
        var totalCollections = merchantCollections.reduce((s,c) => s + (Number(c['قيمة التحصيل']) || 0), 0);
        var remaining = Math.max(0, totalTransfers - totalCollections - amount);
        
        var refCode = editId;
        if(!editId || editId === 'null' || editId === '') {
            refCode = 'COL-' + now.toISOString().split('T')[0].replace(/-/g,'') + '-' + String(Math.floor(Math.random()*10000)).padStart(4,'0');
            while(DB.collections.some(c => c['الرقم المرجعي'] === refCode)) {
                refCode = 'COL-' + now.toISOString().split('T')[0].replace(/-/g,'') + '-' + String(Math.floor(Math.random()*10000)).padStart(4,'0');
            }
        }
        var collectionData = {
            "الرقم المرجعي": refCode,
            "رقم التاجر": merchId,
            "اسم التاجر": merchant ? merchant['اسم التاجر'] : '',
            "رقم الحساب": merchant ? merchant['رقم الحساب'] : '',
            "قيمة التحصيل": Math.round(amount * 100) / 100,
            "نوع التحصيل": document.getElementById('col_type') ? document.getElementById('col_type').value : 'جزئي',
            "المتبقي بعد التحصيل": remaining,
            "التاريخ": now.toISOString().split('T')[0],
            "الوقت": formatTimeForDB(now),
            "ملاحظات": document.getElementById('col_notes') ? document.getElementById('col_notes').value.trim() : '',
            "شهر": now.toLocaleString('ar-EG', { month: 'long', year: 'numeric' })
        };
        
        var result;
        if(editId && editId !== 'null' && editId !== '') {
            result = await supabase.from('collections').update(collectionData).eq('الرقم المرجعي', editId);
            if(result.error) throw new Error(result.error.message);
            showToast('✅ تم تحديث التحصيل', 'success');
        } else {
            result = await supabase.from('collections').insert([collectionData]);
            if(result.error) throw new Error(result.error.message);
            showToast('✅ تم إضافة التحصيل', 'success');
            await logAction('تحصيل جديد', refCode, 'تحصيل: ' + amount + ' جنيه - ' + (merchant ? merchant['اسم التاجر'] : ''));
        }
        closeMainModal();
        await refreshAllData();
    } catch(e) {
        console.error('Collection error:', e);
        showToast('❌ فشل الحفظ: ' + e.message, 'error');
    } finally { showLoading(false); }
}

function loadStatement() {
    var merchantId = document.getElementById('stmtMerchantId') ? document.getElementById('stmtMerchantId').value : '';
    if(!merchantId) { showToast('⚠️ اختر تاجراً أولاً', 'warning'); return; }
    var merchant = DB.merchants.find(m => String(m['رقم التاجر']) === String(merchantId));
    if(!merchant) { showToast('❌ لم يتم العثور على التاجر', 'error'); return; }

    var transfers = DB.transfers.filter(t => String(t['رقم التاجر']) === String(merchantId))
        .sort((a,b) => new Date(b['التاريخ'] + ' ' + (b['وقت']||'')) - new Date(a['التاريخ'] + ' ' + (a['وقت']||'')));
    var collectionsSorted = DB.collections.filter(c => String(c['رقم التاجر']) === String(merchantId))
        .sort((a,b) => new Date(b['التاريخ'] + ' ' + (b['وقت']||'')) - new Date(a['التاريخ'] + ' ' + (a['وقت']||''))); // ✅ fixed typo

    var totalTransfers = transfers.reduce((s,t) => s + Math.round((Number(t['قيمة التحويل'])||0)*100),0)/100;
    var totalCollections = collectionsSorted.reduce((s,c) => s + Math.round((Number(c['قيمة التحصيل'])||0)*100),0)/100;

    var stmtTransfers = document.getElementById('stmtTotalTransfers'); if(stmtTransfers) stmtTransfers.innerHTML = formatMoney(totalTransfers);
    var stmtCollections = document.getElementById('stmtTotalCollections'); if(stmtCollections) stmtCollections.innerHTML = formatMoney(totalCollections);
    var stmtRemaining = document.getElementById('stmtRemaining'); if(stmtRemaining) stmtRemaining.innerHTML = formatMoney(totalTransfers - totalCollections);

    var movements = transfers.map(t => ({ ...t, _type: 'transfer', _sort: t['التاريخ'] + ' ' + (t['وقت']||''), _amount: Number(t['قيمة التحويل'])||0 }))
        .concat(collectionsSorted.map(c => ({ ...c, _type: 'collection', _sort: c['التاريخ'] + ' ' + (c['وقت']||''), _amount: -(Number(c['قيمة التحصيل'])||0) })))
        .sort((a,b) => b._sort.localeCompare(a._sort));

    var tbody = document.getElementById('statementTable');
    if(!tbody) return;
    if(!movements.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><p>لا توجد حركات</p></td></tr>'; return; }
    var runningBalance = 0;
    tbody.innerHTML = movements.map((m,i) => {
        var isTransfer = m._type === 'transfer';
        runningBalance += m._amount;
        return `<tr>
            <td>${movements.length - i}</td>
            <td>${formatDate(m['التاريخ'])}</td>
            <td>${formatTime(m['وقت'])}</td>
            <td><span class="badge ${isTransfer ? 'badge-danger' : 'badge-success'}">${isTransfer ? '📤 تحويل' : '📥 تحصيل'}</span></td>
            <td style="color:${isTransfer ? 'var(--danger)' : 'var(--success)'};font-weight:700">${isTransfer ? '+' : '-'}${formatMoney(Math.abs(m._amount))}</td>
            <td><strong style="color:${runningBalance >= 0 ? 'var(--text)' : 'var(--danger)'}">${formatMoney(runningBalance)}</strong></td>
            <td>${m['ملاحظات']||'-'}</td>
        </tr>`;
    }).join('');
}

// ✅ CRITICAL FIX: Corrected normalizeText
function normalizeText(str) {
    if(!str) return '';
    return String(str).trim()
        .replace(/[إأآا]/g, 'ا')
        .replace(/[ة]/g, 'ه')
        .replace(/[يى]/g, 'ي')   // ✅ fixed parentheses
        .replace(/[\u0610-\u061A\u064B-\u065F\u0670]/g, '')
        .toLowerCase();
}

function escapeHtml(str) {
    if(!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

                setConnectionStatus('live');
            } else {
                await refreshAllData();
                cacheManager.set('allData', DB);
            }
            showToast('🎉 مرحباً بعودتك!', 'success');
        } else {
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        }
        setupAutoRefresh();
        showLoading(false);
        isInitialized = true;
        performanceMonitor.end('totalInitialization');
        console.log('✅ Axentro System v3.2 Ready!');
        if(!localStorage.getItem('axentro_visited')) {
            setTimeout(() => { showToast('👋 مرحباً بك في نظام Axentro v3.2!', 'info', 5000); localStorage.setItem('axentro_visited','true'); }, 1000);
        }
    } catch(error) {
        console.error('Fatal initialization error:', error);
        showLoading(false);
        alert('❌ فشل تشغيل النظام\n\n' + error.message + '\n\n• حاول تحديث الصفحة\n• تواصل مع الدعم الفني');
        document.getElementById('loginSection').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
    }
});

function setupAutoRefresh() {
    setInterval(async function() {
        if(!checkSession() || !isInitialized || document.getElementById('appContainer').style.display !== 'flex' || !offlineManager.isOnline) return;
        console.log('🔄 Auto-refresh triggered...');
        try { await refreshAllData(); cacheManager.set('allData', DB); } catch(e) { console.error('Auto-refresh failed:', e); }
    }, CONFIG.AUTO_REFRESH_INTERVAL);
}

// ===== UTILITIES =====
function generateUniqueId(prefix) { return (prefix||'ID') + '-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2,8).toUpperCase(); }
function debounce(func, wait) { var timeout; return function() { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, arguments), wait); }; }
function throttle(func, limit) { var inThrottle; return function() { if(!inThrottle) { func.apply(this, arguments); inThrottle = true; setTimeout(() => inThrottle = false, limit); } }; }
async function copyToClipboard(text) { try { await navigator.clipboard.writeText(text); showToast('📋 تم النسخ: ' + text, 'success', 2000); } catch(e) { var ta = document.createElement('textarea'); ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); showToast('📋 تم النسخ: ' + text, 'success', 2000); document.body.removeChild(ta); } }
function printPage() { window.print(); }
function toggleFullscreen() { if(!document.fullscreenElement) { document.documentElement.requestFullscreen(); showToast('🖥️ وضع ملء الشاشة', 'info', 2000); } else { document.exitFullscreen(); showToast('🖥️ الخروج من ملء الشاشة', 'info', 2000); } }

// ===== DEBUG MODE =====
var DEBUG_MODE = false;
window.toggleDebugMode = function() { DEBUG_MODE = !DEBUG_MODE; console.log(DEBUG_MODE ? '🐛 Debug mode ENABLED' : '🐛 Debug mode DISABLED'); showToast(DEBUG_MODE ? '🐛 وضع التصحيح مفعل' : '🐛 وضع التصحيح معطل', 'warning', 3000); };
window.showConfig = function() { if(!DEBUG_MODE) return; console.table(CONFIG); };
window.showCache = function() { if(!DEBUG_MODE) return; console.log('Cache:', cacheManager.data); };
window.showPerformance = function() { if(!DEBUG_MODE) return; console.table(performanceMonitor.getReport()); };
window.clearAllData = function() { if(!DEBUG_MODE) return; if(confirm('مسح جميع البيانات المحلية؟')) { localStorage.clear(); cacheManager.clear(); location.reload(); } };
window.testLogin = function() { if(!DEBUG_MODE) return; localStorage.setItem('axentro_auth', JSON.stringify({ loggedIn: true, timestamp: Date.now(), sessionExpiry: Date.now() + CONFIG.SESSION_DURATION, method: 'debug' })); location.reload(); };

if('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(reg => console.log('✅ ServiceWorker registered:', reg.scope)).catch(err => console.log('⚠️ ServiceWorker registration failed:', err));
    });
}
