<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>بوابة التاجر - Axentro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (جميع الأنماط كما هي - محذوفة للاختصار لكن يجب الاحتفاظ بها) */
        :root { /* ... نفس الأنماط السابقة ... */ }
        /* ... احتفظ بكل الـ style من الملف الأصلي ... */
    </style>
</head>
<body>
    <div class="container">
        <!-- الصفحة الرئيسية للبوابة (نموذج الطلب) -->
        <div id="portalForm" class="card">
            <div class="header">
                <div class="logo"><i class="fas fa-store"></i></div>
                <h1>بوابة التاجر</h1>
                <p class="subtitle">اختر اسمك لمعرفة بياناتك وتقديم طلب</p>
            </div>

            <!-- اختيار التاجر -->
            <div class="form-group">
                <label>اختر التاجر <span class="required" style="color: var(--danger);">*</span></label>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <select id="merchantSelect" class="form-control" style="flex: 1;" onchange="handleSelect(this.value)">
                        <option value="">-- اختر تاجر --</option>
                    </select>
                    <div style="position: relative; flex: 1;">
                        <input type="text" id="merchantSearch" class="form-control" placeholder="أو ابحث باسم التاجر أو النشاط..." autocomplete="off" oninput="handleSearch(this.value)">
                        <div id="searchResults" class="search-results"></div>
                    </div>
                </div>
                <input type="hidden" id="selectedMerchantId">
            </div>

            <!-- منطقة عرض البيانات -->
            <div id="merchantInfo" style="display: none;">
                <hr>
                <h3><i class="fas fa-user-circle"></i> بيانات التاجر</h3>
                <div class="info-grid" id="merchantDetails"></div>

                <h3><i class="fas fa-cash-register"></i> المكن المرتبط</h3>
                <div id="machinesList"></div>

                <h3><i class="fas fa-exchange-alt"></i> آخر التحويلات</h3>
                <div id="transfersList" style="overflow-x: auto;"></div>

                <h3><i class="fas fa-coins"></i> المديونية الحالية</h3>
                <div id="remainingBalance" class="info-item" style="text-align: center;"></div>

                <hr>

                <h3><i class="fas fa-hand-holding-usd"></i> طلب جديد</h3>
                <div class="radio-group">
                    <label><input type="radio" name="requestType" value="رصيد على المكنة" checked> <i class="fas fa-microchip"></i> رصيد على المكنة</label>
                    <label><input type="radio" name="requestType" value="كاش على المكنة"> <i class="fas fa-money-bill-wave"></i> كاش على المكنة</label>
                </div>
                <div class="form-group">
                    <label>المبلغ <span class="required">*</span></label>
                    <input type="number" id="amount" class="form-control" placeholder="أدخل المبلغ المطلوب" step="any">
                </div>
                <div class="form-group">
                    <label>ملاحظات (اختياري)</label>
                    <input type="text" id="notes" class="form-control" placeholder="أي تفاصيل إضافية">
                </div>
                <button class="btn btn-primary" onclick="submitRequest()"><i class="fas fa-paper-plane"></i> إرسال الطلب</button>
            </div>
        </div>

        <!-- صفحة النجاح (تظهر بعد الإرسال) -->
        <div id="successPage" class="card" style="display: none; text-align: center;">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2>تم إرسال طلبك بنجاح!</h2>
            <p style="margin: 1rem 0; color: var(--muted);">سيتم التواصل معك قريباً لتأكيد الطلب وتنفيذه.</p>
            <button class="btn btn-success" onclick="resetForm()">
                <i class="fas fa-arrow-right"></i> تقديم طلب آخر
            </button>
        </div>
    </div>

    <!-- Footer (يظهر في كلا الصفحتين) -->
    <footer>
        <p>© 2024 Axentro – All Rights Reserved<br>By Axentro Team</p>
        <div class="qr-box">
            <a href="https://axentro-official.github.io/axentro-website/links.html" target="_blank">
                <img src="qr-links.png" alt="QR Code" onerror="this.onerror=null; this.src='https://axentro-official.github.io/axentro-website/qr-links.png';">
                <span><i class="fas fa-qrcode"></i> QR Scan Me</span>
            </a>
        </div>
    </footer>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">جاري التحميل...</div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">تم بنجاح</span>
    </div>

    <script>
        const API = '<?= ScriptApp.getService().getUrl() ?>';
        let merchants = [];
        let currentMerchantData = null;

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function formatNumber(num) {
            if (num === null || num === undefined || isNaN(num)) return '0';
            return Number(num).toLocaleString('ar-EG');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                if (isNaN(d)) return dateStr;
                return d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'numeric', day: 'numeric' });
            } catch { return dateStr; }
        }

        // ==================== API (POST) ====================
        async function api(act, data = {}) {
            try {
                const url = API;
                const response = await fetch(url, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ action: act, data: data })
                });
                return await response.json();
            } catch (e) {
                console.error('API Error:', e);
                return { success: false, message: e.message };
            }
        }

        async function loadMerchants() {
            showLoading(true);
            try {
                const res = await api('getTableData', { table: 'merchants' });
                if (res.success && res.data) {
                    merchants = res.data;
                    populateSelect();
                } else {
                    showToast('فشل تحميل التجار', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                showLoading(false);
            }
        }

        function populateSelect() {
            const select = document.getElementById('merchantSelect');
            select.innerHTML = '<option value="">-- اختر تاجر --</option>';
            merchants.forEach(m => {
                select.innerHTML += `<option value="${m['رقم التاجر']}">${m['اسم التاجر']} (${m['اسم النشاط'] || '-'})</option>`;
            });
        }

        function handleSelect(merchantId) {
            if (!merchantId) {
                document.getElementById('merchantInfo').style.display = 'none';
                document.getElementById('selectedMerchantId').value = '';
                document.getElementById('merchantSearch').value = '';
                return;
            }
            document.getElementById('selectedMerchantId').value = merchantId;
            const merchant = merchants.find(m => m['رقم التاجر'] == merchantId);
            if (merchant) {
                document.getElementById('merchantSearch').value = merchant['اسم التاجر'];
            }
            loadMerchantData(merchantId);
        }

        function handleSearch(query) {
            const listEl = document.getElementById('searchResults');
            if (!query) {
                listEl.style.display = 'none';
                return;
            }
            const filtered = merchants.filter(m => 
                (m['اسم التاجر'] || '').includes(query) || 
                (m['اسم النشاط'] || '').includes(query) ||
                (m['رقم التاجر'] || '').toString().includes(query)
            );
            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="no-result">لا توجد نتائج</div>';
            } else {
                listEl.innerHTML = filtered.map(m => `<div onclick="selectMerchant('${m['رقم التاجر']}', '${m['اسم التاجر']}')">${m['اسم التاجر']} (${m['اسم النشاط'] || '-'})</div>`).join('');
            }
            listEl.style.display = 'block';
        }

        function selectMerchant(id, name) {
            document.getElementById('selectedMerchantId').value = id;
            document.getElementById('merchantSearch').value = name;
            document.getElementById('merchantSelect').value = id;
            document.getElementById('searchResults').style.display = 'none';
            loadMerchantData(id);
        }

        async function loadMerchantData(merchantId) {
            showLoading(true);
            try {
                const res = await api('getMerchantData', { merchantId: merchantId });
                if (res.success && res.data) {
                    currentMerchantData = res.data;
                    renderMerchantInfo(res.data);
                    document.getElementById('merchantInfo').style.display = 'block';
                } else {
                    showToast(res.message || 'فشل تحميل بيانات التاجر', 'error');
                    document.getElementById('merchantInfo').style.display = 'none';
                }
            } catch (e) {
                showToast('حدث خطأ', 'error');
            } finally {
                showLoading(false);
            }
        }

        function renderMerchantInfo(data) {
            const merchant = data.merchant;
            const machines = data.machines;
            const transfers = data.transfers;
            const remaining = data.remaining;

            const detailsHtml = `
                <div class="info-item"><span class="info-label">رقم التاجر</span><div class="info-value">${merchant['رقم التاجر'] || '-'}</div></div>
                <div class="info-item"><span class="info-label">اسم التاجر</span><div class="info-value">${merchant['اسم التاجر'] || '-'}</div></div>
                <div class="info-item"><span class="info-label">رقم الحساب</span><div class="info-value">${merchant['رقم الحساب'] || '-'}</div></div>
                <div class="info-item"><span class="info-label">رقم الهاتف</span><div class="info-value">${merchant['رقم الهاتف'] || '-'}</div></div>
            `;
            document.getElementById('merchantDetails').innerHTML = detailsHtml;

            let machinesHtml = '';
            if (machines.length === 0) {
                machinesHtml = '<p class="info-item">لا توجد مكنات مسجلة</p>';
            } else {
                machines.forEach(m => {
                    machinesHtml += `
                        <div class="machine-item">
                            <strong>${m['رقم المكنة']}</strong> - الرقم التسلسلي: ${m['الرقم التسلسلي'] || 'غير موجود'} 
                            (الحالة: ${m['الحالة'] || '-'})
                        </div>
                    `;
                });
            }
            document.getElementById('machinesList').innerHTML = machinesHtml;

            let transfersHtml = '<table class="transfer-table"><thead><tr><th>التاريخ</th><th>الوقت</th><th>المبلغ</th><th>ملاحظات</th></tr></thead><tbody>';
            if (transfers.length === 0) {
                transfersHtml += '<tr><td colspan="4" style="text-align:center;">لا توجد تحويلات</td></tr>';
            } else {
                transfers.forEach(t => {
                    transfersHtml += `
                        <tr>
                            <td>${formatDate(t['التاريخ'])}</td>
                            <td>${t['الوقت'] || '-'}</td>
                            <td><strong>${formatNumber(t['قيمة التحويل'])}</strong></td>
                            <td>${t['ملاحظات'] || '-'}</td>
                        </tr>
                    `;
                });
            }
            transfersHtml += '</tbody></table>';
            document.getElementById('transfersList').innerHTML = transfersHtml;

            const remainingClass = remaining > 0 ? 'danger' : 'success';
            document.getElementById('remainingBalance').innerHTML = `<div class="info-label">المبلغ المتبقي على التاجر</div><div class="info-value" style="color: var(${remaining > 0 ? '--danger' : '--success'});">${formatNumber(remaining)} جنيه</div>`;
        }

        async function submitRequest() {
            const merchantId = document.getElementById('selectedMerchantId').value;
            if (!merchantId) {
                showToast('الرجاء اختيار التاجر أولاً', 'warning');
                return;
            }
            const amount = document.getElementById('amount').value;
            if (!amount || Number(amount) <= 0) {
                showToast('أدخل مبلغاً صحيحاً أكبر من صفر', 'warning');
                return;
            }
            const requestType = document.querySelector('input[name="requestType"]:checked').value;
            const notes = document.getElementById('notes').value;

            showLoading(true);
            try {
                const res = await api('sendMerchantRequest', {
                    merchantId: merchantId,
                    requestType: requestType,
                    amount: amount,
                    notes: notes
                });
                if (res.success) {
                    document.getElementById('portalForm').style.display = 'none';
                    document.getElementById('successPage').style.display = 'block';
                } else {
                    showToast(res.message || 'فشل إرسال الطلب', 'error');
                }
            } catch (e) {
                showToast('حدث خطأ', 'error');
            } finally {
                showLoading(false);
            }
        }

        function resetForm() {
            document.getElementById('selectedMerchantId').value = '';
            document.getElementById('merchantSearch').value = '';
            document.getElementById('merchantSelect').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('merchantInfo').style.display = 'none';
            document.getElementById('successPage').style.display = 'none';
            document.getElementById('portalForm').style.display = 'block';
            document.querySelector('input[name="requestType"][value="رصيد على المكنة"]').checked = true;
        }

        document.addEventListener('click', function(e) {
            const searchBox = document.getElementById('merchantSearch');
            const results = document.getElementById('searchResults');
            if (searchBox && !searchBox.contains(e.target) && results && !results.contains(e.target)) {
                results.style.display = 'none';
            }
        });

        window.onload = () => {
            loadMerchants();
        };
    </script>
</body>
</html>
