<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ============================================
    // AXENTRO MERCHANT PORTAL v7.0 - FIXED & ROBUST
    // ============================================

    const CONFIG = {
        supabaseUrl: 'https://bwcrdcudpnxkmcyyhzhe.supabase.co',
        supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3Y3JkY3VkcG54a21jeXloemhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDQxNDEsImV4cCI6MjA5MDcyMDE0MX0.Yz19f5HAHfPt2MH-ky56Ccfwb5BAV1eN8PAdmuE1BTY',
        googleScriptUrl: 'https://script.google.com/macros/s/AKfycby5emGQI0R5T8sQls0oOSGL7PUa8AyK5Eya_gFIMo_qLu6ONCHxw0Ewt8Wo6h4N8O2d/exec'
    };

    const supabase = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

    let currentMerchant = null;
    let currentAccountNumber = null;

    // Helper: قراءة حقل من merchant بمحاولة أسماء متعددة
    function getMerchantField(merchant, possibleNames, defaultValue = '—') {
        if (!merchant) return defaultValue;
        for (let name of possibleNames) {
            if (merchant[name] !== undefined && merchant[name] !== null && merchant[name] !== '')
                return merchant[name];
        }
        return defaultValue;
    }

    // Helper: الحصول على ID التاجر (محاولة id, merchant_id, رقم_التاجر)
    function getMerchantId(merchant) {
        return getMerchantField(merchant, ['id', 'merchant_id', 'رقم_التاجر', 'merchantId'], null);
    }

    // Toast notifications (نفس الكود الأصلي)
    function $(id) { return document.getElementById(id); }

    function showToast(message, type = 'success') {
        const container = $('toastContainer');
        const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            <div class="toast-icon"><i class="fas ${icons[type]}"></i></div>
            <span class="toast-message">${message}</span>
            <button class="toast-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
            <div class="toast-progress"></div>
        `;
        container.appendChild(toast);
        setTimeout(() => { if (toast.parentElement) toast.remove(); }, 4500);
    }

    // Boot sequence (بدون تغيير كبير)
    async function runBootSequence() {
        const progress = $('bootProgress');
        const status = $('bootStatus');
        const phase = $('bootPhase');
        const percent = $('bootPercent');
        const steps = [
            { p: 15, s: 'تهيئة النظام الأساسي...', ph: 'System Core' },
            { p: 35, s: 'تحميل الوحدات...', ph: 'Modules' },
            { p: 55, s: 'الاتصال بقاعدة البيانات...', ph: 'Database' },
            { p: 75, s: 'التحقق من الأمان...', ph: 'Security' },
            { p: 90, s: 'تحضير واجهة المستخدم...', ph: 'Interface' },
            { p: 100, s: 'جاهز!', ph: 'Complete' }
        ];
        let current = 0;
        for (const step of steps) {
            while (current < step.p) {
                current += Math.min(3, step.p - current);
                progress.style.width = current + '%';
                percent.textContent = current + '%';
                await new Promise(r => setTimeout(r, 30));
            }
            status.textContent = step.s;
            phase.textContent = step.ph;
            await new Promise(r => setTimeout(r, 200));
        }
        await new Promise(r => setTimeout(r, 400));
        $('bootScreen').classList.add('hidden');
        $('mainApp').classList.add('visible');
        const saved = localStorage.getItem('ax_merchant_account');
        if (saved) $('searchInput').value = saved;
    }

    // دالة البحث الرئيسية (مُحسّنة)
    async function searchMerchant(retryCount = 0) {
        const searchTerm = $('searchInput').value.trim();
        if (!searchTerm) {
            showToast('يرجى إدخال رقم الحساب أو رقم التاجر', 'error');
            $('searchInput').classList.add('shake');
            setTimeout(() => $('searchInput').classList.remove('shake'), 500);
            return;
        }

        showToast('جاري البحث عن البيانات...', 'info');
        console.log('🔍 Searching for:', searchTerm);

        try {
            // محاولة 1: البحث المباشر باستخدام OR
            let { data: merchants, error } = await supabase
                .from('merchants')
                .select('*')
                .or(`رقم_التاجر.eq.${searchTerm},رقم الحساب.eq.${searchTerm},account_number.eq.${searchTerm},merchant_id.eq.${searchTerm},id.eq.${searchTerm}`)
                .limit(10);

            if (error) throw error;

            // محاولة 2: إذا لم ينجح، نجلب كل التجار ونفلتر يدوياً (مرن أكثر)
            if (!merchants || merchants.length === 0) {
                console.log('🔄 Exact match failed, fetching all merchants for client-side filtering...');
                const { data: all, error: fetchError } = await supabase.from('merchants').select('*').limit(500);
                if (fetchError) throw fetchError;

                if (all && all.length) {
                    merchants = all.filter(m => {
                        const term = searchTerm.toLowerCase();
                        const fields = [
                            m['رقم_التاجر'], m['رقم الحساب'], m['account_number'],
                            m['merchant_id'], m['id'], m['phone'], m['رقم_الهاتف']
                        ].map(v => String(v || '').toLowerCase());
                        return fields.some(f => f === term || f.includes(term));
                    });
                }
            }

            if (!merchants || merchants.length === 0) {
                if (retryCount < 2) {
                    await new Promise(r => setTimeout(r, 1000));
                    return searchMerchant(retryCount + 1);
                }
                showToast('❌ لم يتم العثور على تاجر بهذا الرقم', 'error');
                updateDebugPanel({ searchTerm, message: 'Merchant not found', suggestion: 'تأكد من رقم التاجر أو جرب رقماً آخر' });
                return;
            }

            // نجاح
            currentMerchant = merchants[0];
            currentAccountNumber = searchTerm;
            localStorage.setItem('ax_merchant_account', searchTerm);

            console.log('✅ Merchant loaded:', currentMerchant);
            await renderDashboard(currentMerchant);

            $('loginSection').style.display = 'none';
            $('dashboardSection').style.display = 'block';
            showToast(`مرحباً ${getMerchantField(currentMerchant, ['اسم_التاجر', 'اسم التاجر', 'name'])} 👋`, 'success');

        } catch (error) {
            console.error('❌ Search error:', error);
            if (retryCount < 2) {
                await new Promise(r => setTimeout(r, 1500));
                return searchMerchant(retryCount + 1);
            }
            showToast('حدث خطأ في الاتصال بقاعدة البيانات', 'error');
            updateDebugPanel({ error: error.message, searchTerm, suggestion: 'تحقق من اتصال الإنترنت أو توفر الجداول' });
        }
    }

    // عرض لوحة التحكم (مع حماية ضد الحقول المفقودة)
    async function renderDashboard(merchant) {
        $('merchantInfoCard').style.display = 'block';
        $('displayName').textContent = getMerchantField(merchant, ['اسم_التاجر', 'اسم التاجر', 'name']);
        $('displayNumber').textContent = getMerchantField(merchant, ['رقم_التاجر', 'merchant_id', 'id']);
        $('displayActivity').textContent = getMerchantField(merchant, ['اسم_النشاط', 'اسم النشاط', 'activity']);
        $('displayPhone').textContent = getMerchantField(merchant, ['رقم_الهاتف', 'phone']);
        $('displayArea').textContent = getMerchantField(merchant, ['المنطقة', 'area']);
        $('displayAddress').textContent = getMerchantField(merchant, ['العنوان', 'address']);
        $('displayStatus').textContent = getMerchantField(merchant, ['الحالة', 'status'], 'نشط');

        const merchantId = getMerchantId(merchant);
        if (!merchantId) {
            console.warn('⚠️ No merchant ID found, using fallback');
            showToast('تعذر العثور على معرف التاجر، بعض البيانات غير متوفرة', 'warning');
            return;
        }

        await Promise.all([
            loadMachines(merchantId),
            calculateStats(merchantId),
            loadTransfers(merchantId),
            loadCollections(merchantId),
            loadRequests(merchantId)
        ]);
    }

    // تحميل المكنات (مع تجاهل الأخطاء)
    async function loadMachines(merchantId) {
        try {
            const { data, error } = await supabase.from('machines').select('*').eq('merchant_id', merchantId).limit(50);
            if (error) throw error;
            const count = data?.length || 0;
            $('machinesCount').textContent = count;
            $('machinesCountBadge').textContent = count;
        } catch (e) { console.error('Machines error:', e); $('machinesCount').textContent = '0'; }
    }

    // حساب الإحصائيات
    async function calculateStats(merchantId) {
        try {
            const [transfersRes, collectionsRes] = await Promise.all([
                supabase.from('transfers').select('amount').eq('merchant_id', merchantId),
                supabase.from('collections').select('amount,remaining').eq('merchant_id', merchantId)
            ]);
            const transfersTotal = transfersRes.data?.reduce((s, t) => s + (parseFloat(t.amount) || 0), 0) || 0;
            const collectionsTotal = collectionsRes.data?.reduce((s, c) => s + (parseFloat(c.amount) || 0), 0) || 0;
            const balance = transfersTotal - collectionsTotal;
            $('totalTransfers').textContent = transfersTotal.toLocaleString();
            $('totalCollections').textContent = collectionsTotal.toLocaleString();
            $('currentBalance').textContent = balance.toLocaleString();
            $('displayDebt').textContent = `${balance.toLocaleString()} ج.م`;
        } catch (e) { console.error('Stats error:', e); }
    }

    // باقي الدوال (loadTransfers, loadCollections, loadRequests) بنفس المنطق ولكن مع تحسين قراءة الحقول
    async function loadTransfers(merchantId) {
        try {
            const { data, error } = await supabase.from('transfers').select('*').eq('merchant_id', merchantId).order('created_at', { ascending: false }).limit(5);
            if (error) throw error;
            const tbody = $('transfersTableBody');
            if (!data?.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد تحويلات</p></div></td></tr>'; return; }
            tbody.innerHTML = data.map((t, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td><span class="ref-code">${t.ref_number || t['الرقم المرجعي'] || '—'}</span></td>
                    <td>${formatDate(t.date || t['التاريخ'])}</td>
                    <td>${formatTime(t.time || t['الوقت'])}</td>
                    <td>${t.type || t['نوع التحويل'] || '—'}</td>
                    <td class="amount-negative">${(parseFloat(t.amount) || 0).toLocaleString()} ج.م</td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function loadCollections(merchantId) {
        try {
            const { data, error } = await supabase.from('collections').select('*').eq('merchant_id', merchantId).order('created_at', { ascending: false }).limit(5);
            if (error) throw error;
            const tbody = $('collectionsTableBody');
            if (!data?.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد تحصيلات</p></div></td></tr>'; return; }
            tbody.innerHTML = data.map((c, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td><span class="ref-code">${c.ref_number || c['الرقم المرجعي'] || '—'}</span></td>
                    <td>${formatDate(c.date || c['التاريخ'])}</td>
                    <td>${formatTime(c.time || c['الوقت'])}</td>
                    <td class="amount-positive">${(parseFloat(c.amount) || 0).toLocaleString()} ج.م</td>
                    <td class="amount-negative">${(parseFloat(c.remaining) || 0).toLocaleString()} ج.م</td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function loadRequests(merchantId) {
        try {
            const { data, error } = await supabase.from('requests').select('*').eq('merchant_id', merchantId).order('created_at', { ascending: false }).limit(15);
            if (error) throw error;
            const container = $('requestsList');
            if (!data?.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-clipboard-list"></i><p>لا توجد طلبات سابقة</p></div>'; return; }
            container.innerHTML = data.map(r => {
                const statusClass = getStatusClass(r.status || r['الحالة']);
                return `
                    <div class="request-item ${statusClass}">
                        <div class="request-header">
                            <span class="request-ref">#${r.request_number || r['رقم الطلب'] || '—'}</span>
                            <span class="badge badge-${statusClass}">${r.status || r['الحالة'] || '—'}</span>
                        </div>
                        <div class="request-grid">
                            <div class="detail-item"><div class="detail-label">التاريخ</div><div class="detail-value">${formatDate(r.date || r['التاريخ'])}</div></div>
                            <div class="detail-item"><div class="detail-label">نوع الطلب</div><div class="detail-value">${r.type || r['نوع الطلب'] || '—'}</div></div>
                            <div class="detail-item"><div class="detail-label">المبلغ</div><div class="detail-value amount">${(parseFloat(r.amount) || 0).toLocaleString()} ج.م</div></div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch(e) { console.error(e); }
    }

    // دوال مساعدة (formatDate, formatTime, getStatusClass) كما هي مع تحسين طفيف
    function formatDate(dateStr) {
        if (!dateStr) return '—';
        try { return new Date(dateStr).toLocaleDateString('ar-EG'); } catch(e) { return dateStr; }
    }
    function formatTime(timeStr) {
        if (!timeStr) return '—';
        try { return new Date(timeStr).toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' }); } catch(e) { return timeStr; }
    }
    function getStatusClass(status) {
        const s = String(status || '').toLowerCase();
        if (s.includes('معلق')) return 'pending';
        if (s.includes('مكتمل')) return 'completed';
        if (s.includes('ملغي')) return 'cancelled';
        return 'pending';
    }

    // إرسال الطلب (مع تحسين)
    async function submitRequest() {
        if (!currentMerchant) { showToast('خطأ: لا يوجد تاجر محدد', 'error'); return; }
        const type = $('requestType').value;
        const amount = parseFloat($('requestAmount').value);
        const notes = $('requestNotes').value.trim();
        if (!type) { showToast('يرجى اختيار نوع الطلب', 'error'); return; }
        if (!amount || amount <= 0) { showToast('يرجى إدخال مبلغ صحيح', 'error'); return; }

        const refNum = `REQ-${Date.now()}-${Math.floor(Math.random()*10000)}`;
        const requestData = {
            request_number: refNum,
            date: new Date().toISOString().split('T')[0],
            time: new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }),
            created_at: new Date().toISOString(),
            merchant_id: getMerchantId(currentMerchant),
            merchant_name: getMerchantField(currentMerchant, ['اسم_التاجر', 'اسم التاجر']),
            activity: getMerchantField(currentMerchant, ['اسم_النشاط', 'اسم النشاط']),
            type, amount, notes: notes || null, status: 'معلق'
        };
        showToast('جاري إرسال الطلب...', 'info');
        try {
            const response = await fetch(CONFIG.googleScriptUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestData) });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            await response.json();
            closeRequestModal();
            $('successRefNumber').textContent = refNum;
            $('successModal').classList.add('show');
            if (currentMerchant) await loadRequests(getMerchantId(currentMerchant));
            showToast('تم إرسال الطلب بنجاح!', 'success');
        } catch(e) {
            console.error(e);
            showToast('تعذر إرسال الطلب، حاول مرة أخرى', 'error');
        }
    }

    // باقي الدوال المساعدة (openRequestModal, closeRequestModal, closeSuccessAndNew, refreshData, scrollToInfo, toggleDebug, updateDebugPanel, showSection, handleKeyPress)
    function openRequestModal() { if(!currentMerchant) showToast('يجب البحث عن الحساب أولاً','warning'); else $('requestModal').classList.add('show'); }
    function closeRequestModal() { $('requestModal').classList.remove('show'); $('requestType').value=''; $('requestAmount').value=''; $('requestNotes').value=''; }
    function closeSuccessAndNew() { $('successModal').classList.remove('show'); setTimeout(()=>openRequestModal(),300); }
    async function refreshData() { if(!currentMerchant) showToast('لا توجد بيانات','warning'); else { showToast('جاري التحديث...','info'); await renderDashboard(currentMerchant); showToast('تم التحديث ✅','success'); } }
    function scrollToInfo() { $('merchantInfoCard').scrollIntoView({ behavior:'smooth' }); }
    function toggleDebug() { $('debugPanel').classList.toggle('visible'); if($('debugPanel').classList.contains('visible') && currentMerchant) updateDebugPanel({ merchant:currentMerchant, accountNumber:currentAccountNumber }); }
    function updateDebugPanel(data) { $('debugPanel').textContent = `DEBUG INFO:\n${JSON.stringify(data, null, 2)}`; }
    function showSection(sectionName) { console.log('Navigate to', sectionName); }
    function handleKeyPress(event) { if(event.key === 'Enter') searchMerchant(); }

    // بدء التطبيق
    document.addEventListener('DOMContentLoaded', () => { runBootSequence(); });
</script>
