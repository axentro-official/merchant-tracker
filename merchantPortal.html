<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0f2c">
    <title>بوابة التاجر | نظام متكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f2c 0%, #0b132b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eef5ff;
        }

        /* شاشة التحميل */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0a0f2c, #030617);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(4px);
        }

        /* أيقونة احترافية بدلاً من النص */
        .splash-icon {
            font-size: 5rem;
            background: linear-gradient(135deg, #D4AF37, #F9E076);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px rgba(212,175,55,0.5); }
            100% { transform: scale(1); opacity: 0.7; }
        }

        .splash-sub {
            font-size: 0.9rem;
            color: #a0a8c0;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .progress-bar-container {
            width: 240px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 2rem;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #D4AF37, #F9E076);
            border-radius: 4px;
            transition: width 0.2s linear;
        }

        .splash-text {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #b9c3e6;
        }

        /* الواجهة الرئيسية */
        .merchant-dashboard {
            opacity: 0;
            visibility: hidden;
            width: 100%;
            max-width: 1400px;
            margin: 1rem;
            transition: opacity 0.5s ease;
        }

        .merchant-dashboard.active {
            opacity: 1;
            visibility: visible;
        }

        .glass-card {
            background: rgba(15, 25, 55, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
            transition: transform 0.2s, border-color 0.2s;
        }

        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.6);
            transform: translateY(-3px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2rem;
            color: #D4AF37;
            filter: drop-shadow(0 0 5px rgba(212,175,55,0.5));
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .merchant-badge {
            background: rgba(212,175,55,0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(212,175,55,0.4);
        }

        .search-section {
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .input-group input {
            flex: 2;
            min-width: 220px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #2c3a6e;
            border-radius: 60px;
            padding: 0.9rem 1.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
        }

        .btn-gold {
            background: linear-gradient(95deg, #D4AF37, #F3D572);
            border: none;
            padding: 0 2rem;
            border-radius: 60px;
            font-weight: 700;
            color: #0a0f2c;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-gold:active {
            transform: scale(0.97);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0.5rem 0;
            color: #F9E076;
        }

        .transactions-table-wrapper {
            overflow-x: auto;
            padding: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem 0.8rem;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #D4AF37;
            font-weight: 600;
        }

        .status-badge {
            background: rgba(46, 204, 113, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #2ecc71;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.2);
            border-right: 3px solid #e74c3c;
            padding: 1rem;
            border-radius: 16px;
            margin-top: 1rem;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: #6c7a9e;
        }

        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            .btn-gold {
                padding: 0.8rem 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- شاشة التحميل -->
<div id="splash" class="splash-screen">
    <div class="splash-icon">
        <i class="fas fa-store-alt"></i>
    </div>
    <div class="splash-sub">Merchant Runtime Environment v7.0</div>
    <div class="progress-bar-container">
        <div id="progressFill" class="progress-fill"></div>
    </div>
    <div id="splashStatus" class="splash-text">تمهيد الأنظمة...</div>
</div>

<!-- لوحة التحكم -->
<div id="dashboard" class="merchant-dashboard">
    <div class="glass-card header">
        <div class="logo-area">
            <i class="fas fa-crown logo-icon"></i>
            <h1>بوابة التاجر</h1>
        </div>
        <div class="merchant-badge">
            <i class="fas fa-shield-alt"></i> بيئة آمنة
        </div>
    </div>

    <div class="glass-card search-section">
        <div class="input-group">
            <input type="text" id="merchantAccount" placeholder="أدخل رقم حساب التاجر (مثال: 1001)" autocomplete="off">
            <button id="searchBtn" class="btn-gold"><i class="fas fa-search"></i> استعلام</button>
        </div>
        <div id="searchError" style="min-height: 50px;"></div>
    </div>

    <div id="merchantInfoArea" style="display: none;">
        <div class="info-grid" id="statsGrid"></div>
        <div class="glass-card" style="padding: 1.5rem;">
            <h3 style="margin-bottom: 1rem;"><i class="fas fa-history"></i> آخر المعاملات</h3>
            <div class="transactions-table-wrapper">
                <table id="transactionsTable">
                    <thead>
                        <tr><th>التاريخ</th><th>نوع العملية</th><th>المبلغ</th><th>الحالة</th></tr>
                    </thead>
                    <tbody id="transactionsBody">
                        <tr><td colspan="4" style="text-align:center;">لا توجد معاملات</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer>
        <i class="fas fa-lock"></i> بيانات مشفرة • نظام المدفوعات المتكامل
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // تكوين Supabase
    const SUPABASE_URL = 'https://bwcrdcudpnxkmcyyhzhe.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3Y3JkY3VkcG54a21jeXloemhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDQxNDEsImV4cCI6MjA5MDcyMDE0MX0.Yz19f5HAHfPt2MH-ky56Ccfwb5BAV1eN8PAdmuE1BTY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // شاشة التحميل - محاكاة تقدم مضمونة الوصول إلى 100%
    let progress = 0;
    const progressFill = document.getElementById('progressFill');
    const splashStatus = document.getElementById('splashStatus');
    const splashDiv = document.getElementById('splash');
    const dashboardDiv = document.getElementById('dashboard');

    const steps = [
        { progress: 20, text: "تحميل البيئة الآمنة..." },
        { progress: 45, text: "توصيل بقاعدة البيانات..." },
        { progress: 70, text: "تهيئة واجهة التاجر..." },
        { progress: 95, text: "إنهاء الاستعداد..." }
    ];

    let stepIndex = 0;
    // دالة لتحديث التقدم بشكل تدريجي وآمن
    function updateProgress(targetProgress, stepText) {
        return new Promise((resolve) => {
            let current = progress;
            const interval = setInterval(() => {
                if (current < targetProgress) {
                    current += Math.max(1, Math.floor((targetProgress - current) / 5));
                    if (current > targetProgress) current = targetProgress;
                    progressFill.style.width = current + '%';
                    progress = current;
                } else {
                    clearInterval(interval);
                    resolve();
                }
            }, 30);
            splashStatus.innerText = stepText;
        });
    }

    async function runSplash() {
        for (const step of steps) {
            await updateProgress(step.progress, step.text);
            await new Promise(r => setTimeout(r, 200));
        }
        // الوصول إلى 100%
        await updateProgress(100, "جاهز! مرحباً بك.");
        await new Promise(r => setTimeout(r, 300));
        // إخفاء شاشة التحميل
        splashDiv.style.opacity = '0';
        setTimeout(() => {
            splashDiv.style.display = 'none';
            dashboardDiv.classList.add('active');
        }, 500);
    }

    // بدء التحميل
    runSplash();

    // دوال واجهة التاجر
    const merchantAccountInput = document.getElementById('merchantAccount');
    const searchBtn = document.getElementById('searchBtn');
    const merchantInfoArea = document.getElementById('merchantInfoArea');
    const searchErrorDiv = document.getElementById('searchError');
    const statsGrid = document.getElementById('statsGrid');
    const transactionsBody = document.getElementById('transactionsBody');

    async function fetchMerchantData(accountNumber) {
        searchErrorDiv.innerHTML = '';
        merchantInfoArea.style.display = 'none';

        if (!accountNumber || accountNumber.trim() === '') {
            searchErrorDiv.innerHTML = '<div class="error-msg"><i class="fas fa-exclamation-triangle"></i> الرجاء إدخال رقم الحساب</div>';
            return;
        }

        // محاولة جلب بيانات التاجر
        const { data: merchantData, error: merchantError } = await supabase
            .from('merchants')
            .select('*')
            .eq('merchant_id', accountNumber)
            .single();

        if (merchantError || !merchantData) {
            // عرض رسالة خطأ ودية مع إمكانية استخدام بيانات تجريبية للعرض (اختياري)
            searchErrorDiv.innerHTML = `<div class="error-msg"><i class="fas fa-database"></i> لم يتم العثور على تاجر برقم ${accountNumber}. تأكد من الرقم أو تواصل مع الدعم.</div>`;
            return;
        }

        // جلب المعاملات
        const { data: transactions, error: transError } = await supabase
            .from('merchant_transactions')
            .select('*')
            .eq('merchant_id', accountNumber)
            .order('created_at', { ascending: false })
            .limit(10);

        if (transError) console.warn("خطأ في المعاملات", transError);

        merchantInfoArea.style.display = 'block';

        const balance = merchantData.balance || 0;
        const totalSales = merchantData.total_sales || 0;
        const joinDate = merchantData.join_date ? new Date(merchantData.join_date).toLocaleDateString('ar-EG') : 'غير محدد';

        statsGrid.innerHTML = `
            <div class="glass-card stat-card">
                <i class="fas fa-user-circle fa-2x" style="color:#D4AF37;"></i>
                <div style="font-size:1.2rem; margin-top:0.5rem;">${merchantData.full_name || '---'}</div>
                <div class="stat-value">${Number(balance).toLocaleString()} ج.م</div>
                <div>الرصيد الحالي</div>
            </div>
            <div class="glass-card stat-card">
                <i class="fas fa-chart-line fa-2x"></i>
                <div class="stat-value">${Number(totalSales).toLocaleString()} ج.م</div>
                <div>إجمالي المبيعات</div>
            </div>
            <div class="glass-card stat-card">
                <i class="fas fa-calendar-alt fa-2x"></i>
                <div class="stat-value">${joinDate}</div>
                <div>تاريخ الانضمام</div>
            </div>
        `;

        if (transactions && transactions.length > 0) {
            let rows = '';
            transactions.forEach(tx => {
                const date = new Date(tx.created_at).toLocaleString('ar-EG');
                const type = tx.type === 'sale' ? 'بيع' : (tx.type === 'refund' ? 'استرداد' : 'شحن');
                const amount = Number(tx.amount).toLocaleString() + ' ج.م';
                const status = tx.status || 'completed';
                rows += `<tr>
                            <td>${date}</td>
                            <td>${type}</td>
                            <td>${amount}</td>
                            <td><span class="status-badge">${status === 'completed' ? 'مكتملة' : 'معلقة'}</span></td>
                         </tr>`;
            });
            transactionsBody.innerHTML = rows;
        } else {
            transactionsBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا توجد معاملات حديثة</td></tr>';
        }
    }

    searchBtn.addEventListener('click', () => fetchMerchantData(merchantAccountInput.value));
    merchantAccountInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchMerchantData(merchantAccountInput.value);
    });

    // ملاحظة: تم إزالة Service Worker لتجنب مشاكل المسارات في البداية، يمكن إضافته لاحقاً
</script>
</body>
</html>
