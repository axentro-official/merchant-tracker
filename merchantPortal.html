<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>بوابة التاجر - Axentro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* جميع الأنماط الأصلية (لم تتغير) */
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --secondary: #6366f1;
            --bg: #f8fafc;
            --bg-dark: #0f172a;
            --white: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --success: #10b981;
            --success-light: #d1fae5;
            --danger: #ef4444;
            --border: #e2e8f0;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 800px; margin: 0 auto; padding: 1rem; flex: 1; }
        .card { background: var(--white); border-radius: var(--radius); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; margin-bottom: 1.5rem; }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .logo { width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        .logo i { font-size: 1.8rem; color: white; }
        h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 0.25rem; }
        .subtitle { color: var(--muted); font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; position: relative; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-control { width: 100%; padding: 0.8rem 1rem; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 0.95rem; transition: all 0.3s; background: var(--bg); }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59,130,246,0.1); background: white; }
        .search-results { position: absolute; top: 100%; right: 0; left: 0; background: var(--white); border: 1px solid var(--border); border-radius: 0 0 var(--radius-sm) var(--radius-sm); max-height: 250px; overflow-y: auto; z-index: 1000; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: none; }
        .search-results div { padding: 0.8rem 1rem; cursor: pointer; border-bottom: 1px solid var(--border); }
        .search-results div:hover { background: var(--primary); color: white; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
        .info-item { background: #f1f5f9; padding: 0.75rem; border-radius: var(--radius-sm); }
        .info-label { font-size: 0.75rem; color: var(--muted); }
        .info-value { font-size: 1rem; font-weight: 600; }
        .machine-item { background: #f8fafc; padding: 0.75rem; border-radius: var(--radius-sm); margin-bottom: 0.5rem; border-right: 3px solid var(--primary); }
        .transfer-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        .transfer-table th, .transfer-table td { padding: 0.5rem; text-align: right; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .transfer-table th { color: var(--muted); font-weight: 600; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.8rem 1.5rem; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: all 0.3s; width: 100%; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 14px rgba(59,130,246,0.4); }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .radio-group { display: flex; gap: 1rem; margin: 0.5rem 0; }
        .radio-group label { display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 0.8rem 1.5rem; border-radius: 50px; z-index: 9998; transition: transform 0.3s; display: flex; align-items: center; gap: 0.5rem; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        hr { margin: 1rem 0; border-color: var(--border); }
        footer { background: linear-gradient(135deg, var(--bg-dark) 0%, #1e293b 100%); padding: 2rem; text-align: center; margin-top: auto; }
        footer p { color: #94a3b8; font-size: 0.85rem; line-height: 1.8; }
        .qr-box { margin-top: 1.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: float 4s ease-in-out infinite; }
        .qr-box img { width: 100px; border-radius: var(--radius-sm); border: 3px solid rgba(255,255,255,0.2); margin-bottom: 0.8rem; transition: all 0.3s; }
        .qr-box img:hover { transform: scale(1.1); border-color: var(--primary); }
        .qr-box a { color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; transition: all 0.3s; }
        .qr-box a:hover { color: #60a5fa; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .success-icon { font-size: 4rem; color: var(--success); margin-bottom: 1rem; }
        .success-message { text-align: center; padding: 2rem; }
        @media (max-width: 640px) {
            .info-grid { grid-template-columns: 1fr; }
            .container { padding: 0.5rem; }
            .card { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="portalForm" class="card">
            <div class="header">
                <div class="logo"><i class="fas fa-store"></i></div>
                <h1>بوابة التاجر</h1>
                <p class="subtitle">اختر اسمك لمعرفة بياناتك وتقديم طلب</p>
            </div>

            <div class="form-group">
                <label>اختر التاجر <span class="required" style="color: var(--danger);">*</span></label>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <select id="merchantSelect" class="form-control" style="flex: 1;" onchange="handleSelect(this.value)">
                        <option value="">-- اختر تاجر --</option>
                    </select>
                    <div style="position: relative; flex: 1;">
                        <input type="text" id="merchantSearch" class="form-control" placeholder="أو ابحث باسم التاجر أو النشاط..." autocomplete="off" oninput="handleSearch(this.value)">
                        <div id="searchResults" class="search-results"></div>
                    </div>
                </div>
                <input type="hidden" id="selectedMerchantId">
            </div>

            <div id="merchantInfo" style="display: none;">
                <hr>
                <h3><i class="fas fa-user-circle"></i> بيانات التاجر</h3>
                <div class="info-grid" id="merchantDetails"></div>

                <h3><i class="fas fa-cash-register"></i> المكن المرتبط</h3>
                <div id="machinesList"></div>

                <h3><i class="fas fa-exchange-alt"></i> آخر التحويلات</h3>
                <div id="transfersList" style="overflow-x: auto;"></div>

                <h3><i class="fas fa-coins"></i> المديونية الحالية</h3>
                <div id="remainingBalance" class="info-item" style="text-align: center;"></div>

                <hr>

                <h3><i class="fas fa-hand-holding-usd"></i> طلب جديد</h3>
                <div class="radio-group">
                    <label><input type="radio" name="requestType" value="رصيد على المكنة" checked> <i class="fas fa-microchip"></i> رصيد على المكنة</label>
                    <label><input type="radio" name="requestType" value="كاش على المكنة"> <i class="fas fa-money-bill-wave"></i> كاش على المكنة</label>
                </div>
                <div class="form-group">
                    <label>المبلغ <span class="required">*</span></label>
                    <input type="number" id="amount" class="form-control" placeholder="أدخل المبلغ المطلوب" step="any">
                </div>
                <div class="form-group">
                    <label>ملاحظات (اختياري)</label>
                    <input type="text" id="notes" class="form-control" placeholder="أي تفاصيل إضافية">
                </div>
                <button class="btn btn-primary" onclick="submitRequest()"><i class="fas fa-paper-plane"></i> إرسال الطلب</button>
            </div>
        </div>

        <div id="successPage" class="card" style="display: none; text-align: center;">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2>تم إرسال طلبك بنجاح!</h2>
            <p style="margin: 1rem 0; color: var(--muted);">سيتم التواصل معك قريباً لتأكيد الطلب وتنفيذه.</p>
            <button class="btn btn-success" onclick="resetForm()"><i class="fas fa-arrow-right"></i> تقديم طلب آخر</button>
        </div>
    </div>

    <footer>
        <p>© 2024 Axentro – All Rights Reserved<br>By Axentro Team</p>
        <div class="qr-box">
            <a href="https://axentro-official.github.io/axentro-website/links.html" target="_blank">
                <img src="qr-links.png" alt="QR Code" onerror="this.onerror=null; this.src='https://axentro-official.github.io/axentro-website/qr-links.png';">
                <span><i class="fas fa-qrcode"></i> QR Scan Me</span>
            </a>
        </div>
    </footer>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">جاري التحميل...</div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">تم بنجاح</span>
    </div>

    <script>
        // ======================== API CONFIGURATION ========================
        const API_URL = 'https://script.google.com/macros/s/AKfycby5emGQI0R5T8sQls0oOSGL7PUa8AyK5Eya_gFIMo_qLu6ONCHxw0Ewt8Wo6h4N8O2d/exec';

        // Helper: GET request with timeout (10 seconds)
        async function fetchFromAPI(action, timeoutMs = 10000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(`${API_URL}?action=${action}`, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                const data = await response.json();
                return data;
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    console.error('Request timeout:', action);
                    showToast('انتهت مهلة الاتصال بالخادم', 'error');
                } else {
                    console.error('API GET error:', error);
                    showToast('فشل الاتصال بالخادم', 'error');
                }
                return [];
            }
        }

        // Helper: POST request (no-cors – we trust the operation)
        async function postToAPI(action, payload = {}, id = null) {
            const body = {
                action: action,
                data: payload
            };
            if (id !== null) body.id = id;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                return { success: true };
            } catch (error) {
                console.error('API POST error:', error);
                showToast('فشل الحفظ', 'error');
                return { success: false };
            }
        }

        // ======================== GLOBAL VARIABLES ========================
        let merchants = [];
        let currentMerchantData = null;
        let isLoadingMerchants = false;

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.style.display = show ? 'flex' : 'none';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            if (!toast) return;
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function formatNumber(num) {
            if (num === null || num === undefined || isNaN(num)) return '0';
            return Number(num).toLocaleString('ar-EG');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                if (isNaN(d)) return dateStr;
                return d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'numeric', day: 'numeric' });
            } catch { return dateStr; }
        }

        async function loadMerchants() {
            if (isLoadingMerchants) return;
            isLoadingMerchants = true;
            showLoading(true);
            try {
                merchants = await fetchFromAPI('getMerchants');
                populateSelect();
            } catch (e) {
                console.error(e);
                showToast('فشل تحميل التجار', 'error');
            } finally {
                showLoading(false);
                isLoadingMerchants = false;
            }
        }

        function populateSelect() {
            const select = document.getElementById('merchantSelect');
            if (!select) return;
            select.innerHTML = '<option value="">-- اختر تاجر --</option>';
            merchants.forEach(m => {
                select.innerHTML += `<option value="${m['رقم التاجر']}">${m['اسم التاجر']} (${m['اسم النشاط'] || '-'})</option>`;
            });
        }

        function handleSelect(merchantId) {
            if (!merchantId) {
                document.getElementById('merchantInfo').style.display = 'none';
                document.getElementById('selectedMerchantId').value = '';
                document.getElementById('merchantSearch').value = '';
                return;
            }
            // تحديث الحقل المخفي والقائمة المنسدلة وحقل البحث
            document.getElementById('selectedMerchantId').value = merchantId;
            document.getElementById('merchantSelect').value = merchantId;
            const merchant = merchants.find(m => m['رقم التاجر'] == merchantId);
            if (merchant) {
                document.getElementById('merchantSearch').value = merchant['اسم التاجر'];
            }
            loadMerchantData(merchantId);
        }

        function handleSearch(query) {
            const listEl = document.getElementById('searchResults');
            if (!query) {
                listEl.style.display = 'none';
                return;
            }
            const filtered = merchants.filter(m => 
                (m['اسم التاجر'] || '').includes(query) || 
                (m['اسم النشاط'] || '').includes(query) ||
                (m['رقم التاجر'] || '').toString().includes(query)
            );
            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="no-result">لا توجد نتائج</div>';
            } else {
                listEl.innerHTML = filtered.map(m => `<div onclick="selectMerchant('${m['رقم التاجر']}', '${m['اسم التاجر']}')">${m['اسم التاجر']} (${m['اسم النشاط'] || '-'})</div>`).join('');
            }
            listEl.style.display = 'block';
        }

        function selectMerchant(id, name) {
            // تحديث جميع العناصر المرتبطة بالتاجر
            document.getElementById('selectedMerchantId').value = id;
            document.getElementById('merchantSelect').value = id;
            document.getElementById('merchantSearch').value = name;
            document.getElementById('searchResults').style.display = 'none';
            loadMerchantData(id);
        }

        async function loadMerchantData(merchantId) {
            showLoading(true);
            try {
                const merchant = merchants.find(m => m['رقم التاجر'] == merchantId);
                if (!merchant) throw new Error('تاجر غير موجود');
                
                const [allMachines, allTransfers, allCollections] = await Promise.all([
                    fetchFromAPI('getMachines'),
                    fetchFromAPI('getTransfers'),
                    fetchFromAPI('getCollections')
                ]);
                
                const machines = allMachines.filter(m => m['رقم التاجر'] == merchantId);
                const transfers = allTransfers.filter(t => t['رقم التاجر'] == merchantId);
                const collections = allCollections.filter(c => c['رقم التاجر'] == merchantId);
                
                const totalTransfers = transfers.reduce((sum, t) => sum + (Number(t['قيمة التحويل']) || 0), 0);
                const totalCollections = collections.reduce((sum, c) => sum + (Number(c['قيمة التحصيل']) || 0), 0);
                const remaining = totalTransfers - totalCollections;

                currentMerchantData = {
                    merchant: merchant,
                    machines: machines,
                    transfers: transfers,
                    remaining: remaining
                };
                renderMerchantInfo(currentMerchantData);
                document.getElementById('merchantInfo').style.display = 'block';
            } catch (e) {
                showToast(e.message || 'فشل تحميل بيانات التاجر', 'error');
                document.getElementById('merchantInfo').style.display = 'none';
            } finally {
                showLoading(false);
            }
        }

        function renderMerchantInfo(data) {
            const merchant = data.merchant;
            const machines = data.machines;
            const transfers = data.transfers;
            const remaining = data.remaining;

            const detailsHtml = `
                <div class="info-item"><span class="info-label">رقم التاجر</span><div class="info-value">${merchant['رقم التاجر'] || '-'}</div></div>
                <div class="info-item"><span class="info-label">اسم التاجر</span><div class="info-value">${merchant['اسم التاجر'] || '-'}</div></div>
                <div class="info-item"><span class="info-label">رقم الحساب</span><div class="info-value">${merchant['رقم الحساب'] || '-'}</div></div>
                <div class="info-item"><span class="info-label">رقم الهاتف</span><div class="info-value">${merchant['رقم الهاتف'] || '-'}</div></div>
            `;
            document.getElementById('merchantDetails').innerHTML = detailsHtml;

            let machinesHtml = '';
            if (machines.length === 0) {
                machinesHtml = '<p class="info-item">لا توجد مكنات مسجلة</p>';
            } else {
                machines.forEach(m => {
                    machinesHtml += `
                        <div class="machine-item">
                            <strong>${m['رقم المكنة']}</strong> - الرقم التسلسلي: ${m['الرقم التسلسلي'] || 'غير موجود'} 
                            (الحالة: ${m['الحالة'] || '-'})
                        </div>
                    `;
                });
            }
            document.getElementById('machinesList').innerHTML = machinesHtml;

            let transfersHtml = '<table class="transfer-table"><thead><tr><th>التاريخ</th><th>الوقت</th><th>المبلغ</th><th>ملاحظات</th></tr></thead><tbody>';
            if (transfers.length === 0) {
                transfersHtml += '<tr><td colspan="4" style="text-align:center;">لا توجد تحويلات</td></tr>';
            } else {
                transfers.slice(-10).reverse().forEach(t => {
                    transfersHtml += `
                        <tr>
                            <td>${formatDate(t['التاريخ'])}</td>
                            <td>${t['الوقت'] || '-'}</td>
                            <td><strong>${formatNumber(t['قيمة التحويل'])}</strong></td>
                            <td>${t['ملاحظات'] || '-'}</td>
                        </tr>
                    `;
                });
            }
            transfersHtml += '</tbody></table>';
            document.getElementById('transfersList').innerHTML = transfersHtml;

            document.getElementById('remainingBalance').innerHTML = `<div class="info-label">المبلغ المتبقي على التاجر</div><div class="info-value" style="color: var(${remaining > 0 ? '--danger' : '--success'});">${formatNumber(remaining)} جنيه</div>`;
        }

        async function submitRequest() {
            // احصل على رقم التاجر من الحقل المخفي أو من القائمة المنسدلة كاحتياط
            let merchantId = document.getElementById('selectedMerchantId').value;
            if (!merchantId) {
                merchantId = document.getElementById('merchantSelect').value;
            }
            if (!merchantId) {
                showToast('الرجاء اختيار التاجر أولاً', 'warning');
                return;
            }
            const amount = document.getElementById('amount').value;
            if (!amount || Number(amount) <= 0) {
                showToast('أدخل مبلغاً صحيحاً أكبر من صفر', 'warning');
                return;
            }
            const requestType = document.querySelector('input[name="requestType"]:checked').value;
            const notes = document.getElementById('notes').value;
            const merchant = merchants.find(m => m['رقم التاجر'] == merchantId);

            showLoading(true);
            const result = await postToAPI('addMerchantRequest', {
                merchantId: merchantId,
                merchantName: merchant ? merchant['اسم التاجر'] : 'غير معروف',
                requestType: requestType,
                amount: Number(amount),
                notes: notes
            });
            showLoading(false);
            
            if (result.success) {
                document.getElementById('portalForm').style.display = 'none';
                document.getElementById('successPage').style.display = 'block';
                showToast('تم إرسال الطلب بنجاح', 'success');
            } else {
                showToast('حدث خطأ في إرسال الطلب', 'error');
            }
        }

        function resetForm() {
            document.getElementById('selectedMerchantId').value = '';
            document.getElementById('merchantSearch').value = '';
            document.getElementById('merchantSelect').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('merchantInfo').style.display = 'none';
            document.getElementById('successPage').style.display = 'none';
            document.getElementById('portalForm').style.display = 'block';
            document.querySelector('input[name="requestType"][value="رصيد على المكنة"]').checked = true;
        }

        document.addEventListener('click', function(e) {
            const searchBox = document.getElementById('merchantSearch');
            const results = document.getElementById('searchResults');
            if (searchBox && !searchBox.contains(e.target) && results && !results.contains(e.target)) {
                results.style.display = 'none';
            }
        });

        window.onload = () => {
            loadMerchants();
        };
    </script>
</body>
</html>
