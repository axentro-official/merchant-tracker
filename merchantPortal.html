<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="merchant-tracker-manifest.json" />
  <title>بوابة التاجر | Merchant Tracker</title>
  <style>
    :root {
      --bg: #070b16;
      --bg-soft: #0f172a;
      --surface: #111b31;
      --surface-2: #1a2745;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #22d3ee;
      --accent: #8b5cf6;
      --ok: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --radius: 16px;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(34, 211, 238, 0.14), transparent 40%),
        radial-gradient(circle at 20% 90%, rgba(139, 92, 246, 0.16), transparent 45%),
        var(--bg);
      min-height: 100vh;
      overflow: hidden;
    }

    .app {
      max-width: 1050px;
      margin: 24px auto;
      min-height: calc(100vh - 48px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      background: linear-gradient(150deg, rgba(15, 23, 42, 0.96), rgba(10, 17, 33, 0.95));
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 500ms ease;
    }

    .loader-screen {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: linear-gradient(165deg, rgba(7, 11, 22, 0.98), rgba(13, 20, 36, 0.96));
      transition: opacity 400ms ease, visibility 400ms ease;
    }

    .loader-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-box {
      width: min(560px, 92%);
      text-align: center;
      display: grid;
      gap: 16px;
    }

    .logo {
      width: 88px;
      height: 88px;
      margin: 0 auto;
      border-radius: 24px;
      background: linear-gradient(140deg, var(--primary), var(--accent));
      display: grid;
      place-items: center;
      color: #031127;
      font-size: 34px;
      font-weight: 900;
      box-shadow: 0 10px 30px rgba(34, 211, 238, 0.33);
      animation: pulse 1500ms infinite;
    }

    .progress-track {
      height: 12px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.15);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .progress-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 220ms linear;
    }

    .window-bar {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(2, 8, 23, 0.45);
    }

    .window-actions span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-left: 6px;
    }

    .window-actions span:nth-child(1) { background: #f87171; }
    .window-actions span:nth-child(2) { background: #facc15; }
    .window-actions span:nth-child(3) { background: #4ade80; }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
      height: calc(100% - 52px);
    }

    .card {
      background: linear-gradient(170deg, rgba(17, 27, 49, 0.92), rgba(18, 26, 44, 0.78));
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: var(--radius);
      padding: 18px;
      animation: fadeInUp 450ms ease;
    }

    h1, h2, h3, p { margin: 0; }

    .title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill {
      background: rgba(34, 211, 238, 0.15);
      color: var(--primary);
      border: 1px solid rgba(34, 211, 238, 0.35);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    label { color: var(--muted); font-size: 13px; }

    input, select, button {
      font-family: inherit;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(15, 23, 42, 0.74);
      color: var(--text);
      padding: 11px 12px;
      border-radius: 10px;
      transition: all 180ms ease;
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(34, 211, 238, 0.8);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.18);
    }

    button {
      border: none;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(130deg, var(--primary), var(--accent));
      color: #041025;
    }

    button.ghost {
      background: rgba(148, 163, 184, 0.15);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.06); }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .result {
      min-height: 140px;
      border-radius: 12px;
      border: 1px dashed rgba(148, 163, 184, 0.35);
      padding: 14px;
      background: rgba(15, 23, 42, 0.4);
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
      gap: 10px;
    }

    .row:last-child { border-bottom: 0; }

    .status {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }

    .status.show { display: block; }
    .status.ok { background: rgba(34, 197, 94, 0.2); color: #86efac; }
    .status.warn { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }

    .merchant-list {
      max-height: 320px;
      overflow: auto;
      display: grid;
      gap: 10px;
      padding-left: 6px;
    }

    .merchant-item {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 12px;
      padding: 12px;
      background: rgba(15, 23, 42, 0.58);
      transition: all 180ms ease;
    }

    .merchant-item:hover {
      border-color: rgba(34, 211, 238, 0.45);
      transform: translateX(-2px);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .small { font-size: 12px; color: var(--muted); }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .app { margin: 0; min-height: 100vh; border-radius: 0; }
      .container { grid-template-columns: 1fr; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="app" aria-live="polite">
    <section class="loader-screen" id="loaderScreen">
      <div class="loader-box">
        <div class="logo">MT</div>
        <h1>Merchant Tracker</h1>
        <p class="small">تهيئة بوابة التاجر الذكية...</p>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <p id="progressLabel" class="small">0%</p>
      </div>
    </section>

    <header class="window-bar">
      <div class="window-actions"><span></span><span></span><span></span></div>
      <strong>بوابة التاجر - نسخة التطبيق</strong>
      <span class="pill" id="syncState">Ready</span>
    </header>

    <section class="container">
      <article class="card">
        <div class="title">
          <h2>تسجيل تاجر جديد</h2>
          <span class="pill">Automated</span>
        </div>
        <form id="merchantForm" class="grid">
          <div class="form-group">
            <label for="merchantName">اسم التاجر</label>
            <input id="merchantName" required placeholder="مثال: تاجر للتجربة" />
          </div>
          <div class="form-group">
            <label for="merchantPhone">رقم الهاتف</label>
            <input id="merchantPhone" required placeholder="01000000000" />
          </div>
          <div class="form-group">
            <label for="merchantCity">المدينة</label>
            <select id="merchantCity" required>
              <option value="">اختر المدينة</option>
              <option>القاهرة</option>
              <option>الجيزة</option>
              <option>الإسكندرية</option>
              <option>المنصورة</option>
              <option>أسيوط</option>
            </select>
          </div>
          <div class="actions">
            <button type="submit">حفظ التاجر</button>
            <button type="button" class="ghost" id="seedDemo">تحميل بيانات تجريبية</button>
          </div>
          <div id="saveStatus" class="status"></div>
        </form>

        <div class="toolbar">
          <button id="installBtn" class="ghost" type="button">تثبيت التطبيق على الموبايل</button>
          <span class="small">بعد التثبيت هيفتح كتطبيق مستقل (PWA).</span>
        </div>
      </article>

      <article class="card">
        <div class="title">
          <h2>الاستعلام السريع</h2>
          <span class="pill">Live Search</span>
        </div>
        <div class="grid">
          <div class="form-group">
            <label for="query">ابحث بالاسم أو الموبايل</label>
            <input id="query" placeholder="اكتب الاسم أو الرقم..." />
          </div>
          <div class="result" id="result">
            <p class="small">ابدأ بالبحث، أو اضغط تحميل بيانات تجريبية لتجربة فورية.</p>
          </div>
        </div>

        <h3 style="margin: 14px 0 10px;">كل التجار المسجلين</h3>
        <div class="merchant-list" id="merchantList"></div>
      </article>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'merchant_tracker_db_v1';
    const loaderScreen = document.getElementById('loaderScreen');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const syncState = document.getElementById('syncState');
    const merchantForm = document.getElementById('merchantForm');
    const merchantList = document.getElementById('merchantList');
    const queryInput = document.getElementById('query');
    const resultBox = document.getElementById('result');
    const saveStatus = document.getElementById('saveStatus');
    const installBtn = document.getElementById('installBtn');
    const seedDemoBtn = document.getElementById('seedDemo');

    let deferredInstallPrompt = null;

    function bootLoadingScreen() {
      let progress = 0;
      const timer = setInterval(() => {
        progress = Math.min(progress + Math.floor(Math.random() * 16), 100);
        progressFill.style.width = `${progress}%`;
        progressLabel.textContent = `${progress}%`;
        if (progress >= 100) {
          clearInterval(timer);
          setTimeout(() => loaderScreen.classList.add('hidden'), 250);
        }
      }, 100);
    }

    function getMerchants() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function setMerchants(merchants) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(merchants));
      syncState.textContent = `Saved ${new Date().toLocaleTimeString('ar-EG')}`;
    }

    function normalize(v) {
      return (v || '').toString().trim().toLowerCase();
    }

    function merchantTemplate(merchant) {
      return `
        <div class="merchant-item">
          <div class="row"><strong>الاسم</strong><span>${merchant.name}</span></div>
          <div class="row"><strong>الهاتف</strong><span>${merchant.phone}</span></div>
          <div class="row"><strong>المدينة</strong><span>${merchant.city}</span></div>
          <div class="small">ID: ${merchant.id}</div>
        </div>
      `;
    }

    function renderMerchants(items = getMerchants()) {
      if (!items.length) {
        merchantList.innerHTML = '<p class="small">لا توجد سجلات حالياً.</p>';
        return;
      }
      merchantList.innerHTML = items.slice().reverse().map(merchantTemplate).join('');
    }

    function renderSearch(query) {
      const merchants = getMerchants();
      const q = normalize(query);

      if (!q) {
        resultBox.innerHTML = '<p class="small">اكتب اسم تاجر أو رقم هاتف للبحث.</p>';
        return;
      }

      const found = merchants.filter(m =>
        normalize(m.name).includes(q) || normalize(m.phone).includes(q) || normalize(m.id).includes(q)
      );

      if (!found.length) {
        resultBox.innerHTML = `<p>لا توجد نتائج مطابقة لـ <strong>${query}</strong>.</p>`;
        return;
      }

      resultBox.innerHTML = found.map(merchantTemplate).join('');
    }

    function showStatus(message, type = 'ok') {
      saveStatus.textContent = message;
      saveStatus.className = `status show ${type}`;
      setTimeout(() => saveStatus.classList.remove('show'), 2200);
    }

    function saveMerchant(event) {
      event.preventDefault();
      const name = document.getElementById('merchantName').value.trim();
      const phone = document.getElementById('merchantPhone').value.trim();
      const city = document.getElementById('merchantCity').value.trim();

      if (!name || !phone || !city) {
        showStatus('من فضلك املأ كل الحقول المطلوبة.', 'warn');
        return;
      }

      const merchants = getMerchants();
      const merchant = {
        id: `M-${Date.now().toString(36).toUpperCase()}`,
        name,
        phone,
        city,
        createdAt: new Date().toISOString(),
      };

      merchants.push(merchant);
      setMerchants(merchants);
      renderMerchants(merchants);
      renderSearch(queryInput.value);
      merchantForm.reset();
      showStatus(`تم حفظ ${name} بنجاح.`, 'ok');
    }

    function seedDemoData() {
      const merchants = getMerchants();
      if (merchants.some(m => normalize(m.name) === normalize('تاجر للتجربة'))) {
        showStatus('البيانات التجريبية موجودة بالفعل.', 'warn');
        return;
      }

      const demoRows = [
        { id: 'M-DEMO-001', name: 'تاجر للتجربة', phone: '01000111222', city: 'القاهرة', createdAt: new Date().toISOString() },
        { id: 'M-DEMO-002', name: 'مؤسسة النور', phone: '01122334455', city: 'الجيزة', createdAt: new Date().toISOString() },
      ];

      setMerchants([...merchants, ...demoRows]);
      renderMerchants();
      renderSearch(queryInput.value);
      showStatus('تم تحميل بيانات تجريبية بنجاح.', 'ok');
    }

    function setupInstallPrompt() {
      window.addEventListener('beforeinstallprompt', (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        installBtn.disabled = false;
      });

      installBtn.addEventListener('click', async () => {
        if (!deferredInstallPrompt) {
          showStatus('متصفحك لا يدعم التثبيت المباشر حالياً. يمكنك استخدام "Add to Home Screen".', 'warn');
          return;
        }

        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice;
        if (choice.outcome === 'accepted') {
          showStatus('تم بدء تثبيت التطبيق.', 'ok');
        }
        deferredInstallPrompt = null;
      });

      window.addEventListener('appinstalled', () => {
        showStatus('تم تثبيت التطبيق بنجاح على جهازك.', 'ok');
      });
    }

    async function setupServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      try {
        await navigator.serviceWorker.register('merchant-sw.js');
      } catch {
        syncState.textContent = 'SW unavailable';
      }
    }

    merchantForm.addEventListener('submit', saveMerchant);
    queryInput.addEventListener('input', (e) => renderSearch(e.target.value));
    seedDemoBtn.addEventListener('click', seedDemoData);

    bootLoadingScreen();
    renderMerchants();
    setupInstallPrompt();
    setupServiceWorker();
  </script>
</body>
</html>
