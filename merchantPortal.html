                    <div class="form-group">

                            <option value="رصيد خدمات على المكنة">🔄 رصيد خدمات على المكنة</option>

                    <div class="form-group">

                    <button class="btn btn-primary submit-btn" id="submitRequestBtn">

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Audio Elements -->
    <audio id="soundSuccess" preload="auto" src="src/assets/done.mp3"></audio>

    </audio>

    <script>
        // ========== CONFIGURATION ==========
        const SUPABASE_URL = 'https://bwcrdcudpnxkmcyyhzhe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3Y3JkY3VkcG54a21jeXloemhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDQxNDEsImV4cCI6MjA5MDcyMDE0MX0.Yz19f5HAHfPt2MH-ky56Ccfwb5BAV1eN8PAdmuE1BTY';
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5emGQI0R5T8sQls0oOSGL7PUa8AyK5Eya_gFIMo_qLu6ONCHxw0Ewt8Wo6h4N8O2d/exec';

        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentMerchant = null;
        let currentMerchantId = null;
        let currentDebt = 0;
        let machinesList = [];

        // ========== SOUND SYSTEM ==========
        const successSound = document.getElementById('soundSuccess');
        const errorSound = document.getElementById('soundError');

        // وظيفة لتشغيل صوت النجاح
        function playSuccess() {
            if (successSound) {
                successSound.currentTime = 0;
                successSound.play().catch(e => console.warn('Sound play error:', e));
            } else {
                // fallback: beep via Web Audio
                playBeep(523.25, 200);
            }
        }

        // وظيفة لتشغيل صوت الخطأ (beep حاد)
        function playError() {
            if (errorSound && errorSound.src && errorSound.src !== '') {
                errorSound.currentTime = 0;
                errorSound.play().catch(e => console.warn('Sound error fallback'));
            } else {
                playBeep(293.66, 300);
            }
        }

        // توليد صوت بسيط باستخدام Web Audio API (fallback)
        function playBeep(frequency, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.3;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration / 1000);
                setTimeout(() => oscillator.stop(), duration);
            } catch(e) { console.warn('Web Audio not supported'); }
        }

        // ========== UTILITIES ==========
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
            if (type === 'success') playSuccess();
            else if (type === 'error') playError();
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function getCurrentTime12h() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12 || 12;
            return `${hours.toString().padStart(2, '0')}:${minutes} ${ampm}`;
        }

        async function calculateDebt(merchantId) {
            const { data: transfers, error: tErr } = await supabase
                .from('transfers')
                .select('"قيمة التحويل"')
                .eq('"رقم التاجر"', merchantId);
            const { data: collections, error: cErr } = await supabase
                .from('collections')
                .select('"قيمة التحصيل"')
                .eq('"رقم التاجر"', merchantId);
            if (tErr || cErr) return 0;
            const totalTransfers = transfers?.reduce((sum, t) => sum + (Number(t['قيمة التحويل']) || 0), 0) || 0;
            const totalCollections = collections?.reduce((sum, c) => sum + (Number(c['قيمة التحصيل']) || 0), 0) || 0;
            return totalTransfers - totalCollections;
        }

        async function loadMachines(merchantId) {
            const { data, error } = await supabase
                .from('machines')
                .select('id, "رقم المكنة", "الرقم التسلسلي", "الحالة"')
                .eq('"رقم التاجر"', merchantId);
            if (error) {
                console.error('Error loading machines:', error);
                return [];
            }
            machinesList = data || [];
            // تحديث قائمة المكن في نموذج الطلب
            const select = document.getElementById('machineSelect');
            select.innerHTML = '<option value="">-- جميع المكن --</option>';
            machinesList.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = `${m['رقم المكنة']} (${m['الرقم التسلسلي']})`;
                select.appendChild(option);
            });
            return machinesList;
        }

        // عرض المكن في قسم منفصل
        function displayMachines(machines) {
            if (!machines.length) {
                document.getElementById('machinesSection').innerHTML = `
                    <div class="machines-card">
                        <div class="section-title"><i class="fas fa-desktop"></i> المكن المرتبطة</div>
                        <div style="text-align:center; padding:20px; color:#64748b;">لا توجد مكن مسجلة لهذا التاجر</div>
                    </div>
                `;
                document.getElementById('machinesSection').style.display = 'block';
                return;
            }
            let machinesHtml = `
                <div class="machines-card">
                    <div class="section-title"><i class="fas fa-desktop"></i> المكن المرتبطة (${machines.length})</div>
                    <div class="machines-grid">
            `;
            machines.forEach(m => {
                const statusClass = m['الحالة'] === 'نشطة' ? 'status-active' : 'status-inactive';
                const statusText = m['الحالة'] || 'غير معروف';
                machinesHtml += `
                    <div class="machine-item">
                        <div class="machine-code"><i class="fas fa-microchip"></i> ${m['رقم المكنة'] || '—'}</div>
                        <div class="machine-serial"><i class="fas fa-barcode"></i> ${m['الرقم التسلسلي'] || '—'}</div>
                        <div class="machine-status ${statusClass}"><i class="fas fa-circle"></i> ${statusText}</div>
                    </div>
                `;
            });
            machinesHtml += `</div></div>`;
            document.getElementById('machinesSection').innerHTML = machinesHtml;
            document.getElementById('machinesSection').style.display = 'block';
        }

        async function displayMerchant(merchant) {
            currentMerchant = merchant;
            currentMerchantId = merchant.id;
            currentDebt = await calculateDebt(merchant.id);
            const machines = await loadMachines(merchant.id);

            const merchantHtml = `
                <div class="merchant-card">
                    <div class="merchant-name"><i class="fas fa-user-circle"></i> ${merchant['اسم التاجر']}</div>
                    <div class="merchant-detail">
                        <span class="detail-label">رقم التاجر</span>
                        <span class="detail-value">${merchant['رقم التاجر'] || '—'}</span>
                    </div>
                    <div class="merchant-detail">
                        <span class="detail-label">رقم الحساب</span>
                        <span class="detail-value">${merchant['رقم الحساب'] || '—'}</span>
                    </div>
                    <div class="merchant-detail">
                        <span class="detail-label">النشاط</span>
                        <span class="detail-value">${merchant['اسم النشاط']}</span>
                    </div>
                    <div class="merchant-detail">
                        <span class="detail-label">المنطقة</span>
                        <span class="detail-value">${merchant['المنطقة']}</span>
                    </div>
                    <div class="merchant-detail">
                        <span class="detail-label">العنوان</span>
                        <span class="detail-value">${merchant['العنوان'] || '—'}</span>
                    </div>
                    <div class="merchant-detail">
                        <span class="detail-label">المديونية الحالية</span>
                        <span class="detail-value debt-value">${currentDebt.toLocaleString()} ج.م</span>
                    </div>
                </div>
            `;
            document.getElementById('merchantInfo').innerHTML = merchantHtml;
            document.getElementById('merchantInfo').style.display = 'block';
            
            displayMachines(machines);
            document.getElementById('requestForm').style.display = 'block';
        }

        async function searchMerchant() {
            const searchValue = document.getElementById('searchAccount').value.trim();
            if (!searchValue) {
                showToast('الرجاء إدخال رقم الحساب أو رقم التاجر', 'warning');
                return;
            }
            showLoading(true);
            try {
                const { data, error } = await supabase
                    .from('merchants')
                    .select('*')
                    .or(`"رقم الحساب".eq.${searchValue},"رقم التاجر".eq.${searchValue}`)
                    .maybeSingle();

                if (error) throw error;
                if (!data) {
                    showToast('لم يتم العثور على تاجر بهذا الرقم', 'error');
                    document.getElementById('merchantInfo').style.display = 'none';
                    document.getElementById('machinesSection').style.display = 'none';
                    document.getElementById('requestForm').style.display = 'none';
                    return;
                }
                await displayMerchant(data);
                showToast(`مرحباً ${data['اسم التاجر']}`, 'success');
            } catch (err) {
                console.error(err);
                showToast('خطأ في الاتصال بقاعدة البيانات', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function submitRequest() {
            if (!currentMerchant) {
                showToast('الرجاء الاستعلام عن التاجر أولاً', 'warning');
                return;
            }

            const requestType = document.getElementById('requestType').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const notes = document.getElementById('notes').value.trim();
            const machineId = document.getElementById('machineSelect').value;
            let machineSerial = null;
            if (machineId) {
                const selectedMachine = machinesList.find(m => m.id === machineId);
                machineSerial = selectedMachine ? selectedMachine['رقم المكنة'] : null;
            }

            if (!requestType) {
                showToast('يرجى اختيار نوع الطلب', 'warning');
                return;
            }
            if (isNaN(amount) || amount <= 0) {
                showToast('المبلغ يجب أن يكون رقماً موجباً', 'warning');
                return;
            }

            showLoading(true);
            try {
                const requestData = {
                    "التاريخ": new Date().toISOString().split('T')[0],
                    "الوقت": getCurrentTime12h(),
                    "رقم التاجر": currentMerchant.id,
                    "اسم التاجر": currentMerchant['اسم التاجر'],
                    "اسم النشاط": currentMerchant['اسم النشاط'],
                    "رقم الحساب": currentMerchant['رقم الحساب'],
                    "رقم المكنة": machineSerial,
                    "المديونية الحالية": currentDebt,
                    "نوع الطلب": requestType,
                    "المبلغ": amount,
                    "ملاحظات": notes || null,
                    "الحالة": "معلق",
                    "وقت الإنشاء": new Date().toISOString()
                };

                const { data: inserted, error: insertError } = await supabase
                    .from('requests')
                    .insert([requestData])
                    .select()
                    .single();

                if (insertError) throw insertError;

                // إرسال إيميل
                try {
                    const emailPayload = {
                        action: 'sendRequestEmail',
                        payload: {
                            merchant: {
                                code: currentMerchant['رقم التاجر'] || '',
                                name: currentMerchant['اسم التاجر'],
                                phone: currentMerchant['رقم الهاتف'] || '',
                                area: currentMerchant['المنطقة'],
                                status: currentMerchant['الحالة'],
                                accountNumber: currentMerchant['رقم الحساب'] || ''
                            },
                            request: {
                                code: inserted['رقم الطلب'] || 'REQ-' + Date.now(),
                                requestType: requestType,
                                amount: amount,
                                notes: notes || '',
                                date: requestData['التاريخ']
                            },
                            machines: machinesList.map(m => ({
                                code: m['رقم المكنة'],
                                serial: m['الرقم التسلسلي'],
                                status: m['الحالة'],
                                location: ''
                            })),
                            remainingBalance: currentDebt
                        }
                    };
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(emailPayload)
                    }).catch(e => console.warn('Email error:', e));
                } catch (emailErr) {
                    console.warn('Email failed:', emailErr);
                }

                showToast('تم إرسال الطلب بنجاح! رقم المرجع: ' + (inserted['رقم الطلب'] || 'تم توليده'), 'success');
                
                // إعادة تعيين النموذج
                document.getElementById('requestType').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('notes').value = '';
                document.getElementById('machineSelect').value = '';
                
                // تحديث المديونية
                currentDebt = await calculateDebt(currentMerchant.id);
                const debtElement = document.querySelector('.debt-value');
                if (debtElement) debtElement.innerText = currentDebt.toLocaleString() + ' ج.م';

            } catch (err) {
                console.error('Submit error:', err);
                showToast('حدث خطأ أثناء إرسال الطلب: ' + err.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        // ربط الأحداث
        document.getElementById('searchBtn').addEventListener('click', searchMerchant);
        document.getElementById('submitRequestBtn').addEventListener('click', submitRequest);
        document.getElementById('searchAccount').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMerchant();
        });
    </script>
</body>
</html>
